<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Linux Mint — Cinnamon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&family=Noto+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint-green: #87b87f;
    --mint-dark: #5a8a52;
    --panel-bg: rgba(30,34,38,0.96);
    --panel-border: rgba(255,255,255,0.08);
    --win-bg: #2d3035;
    --win-titlebar: #3c4048;
    --win-border: #1a1d21;
    --text: #e8eaed;
    --text-muted: #9aa0a8;
    --accent: #87b87f;
    --hover: rgba(255,255,255,0.07);
    --active: rgba(135,184,127,0.18);
    --shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    --desktop-font: 'Noto Sans', sans-serif;
    --mono-font: 'Noto Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--desktop-font);
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }

  /* ── DESKTOP ── */
  #desktop {
    position: fixed; inset: 0;
    background: url('https://www.linuxmint.com/pictures/wallpapers/1920x1200/darktrails.jpg') center/cover no-repeat;
    background-color: #1b2c1a;
    overflow: hidden;
  }
  #desktop-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 100%);
  }

  /* ── DESKTOP ICONS ── */
  .desktop-icons {
    position: absolute;
    top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .desktop-icon {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; width: 72px;
    transition: background 0.15s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.12); }
  .desktop-icon.selected { background: rgba(135,184,127,0.25); }
  .desktop-icon svg, .desktop-icon .icon-img { width: 40px; height: 40px; }
  .desktop-icon span {
    font-size: 11px; color: #fff;
    text-align: center; line-height: 1.3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
    word-break: break-word;
  }

  /* ── TASKBAR (bottom panel) ── */
  #taskbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 40px;
    background: var(--panel-bg);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--panel-border);
    display: flex; align-items: center;
    z-index: 9000;
    padding: 0 4px;
  }

  /* Menu button */
  #menu-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; height: 32px;
    border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
  }
  #menu-btn:hover { background: var(--hover); }
  #menu-btn svg { width: 20px; height: 20px; fill: var(--mint-green); }
  #menu-btn span { font-size: 13px; font-weight: 500; }

  /* Taskbar separator */
  .tb-sep {
    width: 1px; height: 22px;
    background: var(--panel-border); margin: 0 4px;
  }

  /* Pinned apps */
  #pinned-apps {
    display: flex; align-items: center; gap: 2px;
  }
  .pinned-app {
    width: 34px; height: 34px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .pinned-app:hover { background: var(--hover); }
  .pinned-app.running::after {
    content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--mint-green);
  }
  .pinned-app svg { width: 20px; height: 20px; }

  /* Open window buttons */
  #open-windows {
    display: flex; align-items: center; gap: 2px;
    flex: 1; overflow: hidden;
  }
  .window-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 8px; height: 32px; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
    max-width: 180px; min-width: 100px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .window-btn:hover { background: var(--hover); }
  .window-btn.active { background: var(--active); border-color: rgba(135,184,127,0.3); }
  .window-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .window-btn span { font-size: 11.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* System tray */
  #systray {
    display: flex; align-items: center; gap: 0;
    margin-left: auto;
  }
  .tray-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .tray-icon:hover { background: var(--hover); }
  .tray-icon svg { width: 16px; height: 16px; fill: var(--text-muted); }
  .tray-icon:hover svg { fill: var(--text); }

  #clock {
    padding: 0 10px; height: 32px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; border-radius: 4px;
    transition: background 0.15s; line-height: 1.2;
  }
  #clock:hover { background: var(--hover); }
  #clock .time { font-size: 13px; font-weight: 500; color: var(--text); }
  #clock .date { font-size: 10px; color: var(--text-muted); }

  /* ── WINDOWS ── */
  .window {
    position: fixed;
    background: var(--win-bg);
    border: 1px solid var(--win-border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-width: 300px; min-height: 200px;
    z-index: 100;
    transition: box-shadow 0.15s;
  }
  .window.focused {
    box-shadow: var(--shadow), 0 0 0 1px rgba(135,184,127,0.3);
    z-index: 200;
  }
  .window.minimized { display: none; }
  .window.maximized {
    top: 0 !important; left: 0 !important;
    width: 100vw !important; height: calc(100vh - 40px) !important;
    border-radius: 0;
  }

  /* Titlebar */
  .titlebar {
    height: 32px;
    background: var(--win-titlebar);
    display: flex; align-items: center;
    padding: 0 8px; gap: 8px;
    cursor: move; flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.3);
  }
  .win-controls {
    display: flex; gap: 6px;
  }
  .win-btn {
    width: 13px; height: 13px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: bold;
    transition: filter 0.1s;
    position: relative;
  }
  .win-btn:hover { filter: brightness(1.2); }
  .win-btn.close { background: #ff5f57; }
  .win-btn.minimize { background: #febc2e; }
  .win-btn.maximize { background: #28c840; }
  .win-btn .win-btn-icon { opacity: 0; font-style: normal; font-size: 9px; color: rgba(0,0,0,0.6); line-height: 1; }
  .win-btn:hover .win-btn-icon { opacity: 1; }

  .win-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .win-title { font-size: 12.5px; font-weight: 500; color: var(--text); flex: 1; text-align: center; margin-right: 50px; }

  /* Window content */
  .win-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  /* Resize handle */
  .resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; cursor: se-resize;
  }

  /* ── FILE MANAGER ── */
  .fm-toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .fm-btn {
    padding: 3px 8px; border-radius: 3px; cursor: pointer;
    background: transparent; border: none; color: var(--text-muted);
    font-family: var(--desktop-font); font-size: 12px;
    transition: background 0.15s, color 0.15s;
  }
  .fm-btn:hover { background: var(--hover); color: var(--text); }
  .fm-addressbar {
    flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px; padding: 3px 8px; color: var(--text);
    font-family: var(--mono-font); font-size: 12px; outline: none;
  }
  .fm-body { display: flex; flex: 1; overflow: hidden; }
  .fm-sidebar {
    width: 150px; flex-shrink: 0;
    background: rgba(0,0,0,0.15);
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; padding: 8px 0;
  }
  .fm-sidebar-section { padding: 4px 8px 2px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .fm-sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; cursor: pointer;
    transition: background 0.15s; font-size: 12px; color: var(--text);
    border-radius: 3px; margin: 1px 4px;
  }
  .fm-sidebar-item:hover { background: var(--hover); }
  .fm-sidebar-item.active { background: var(--active); color: var(--mint-green); }
  .fm-sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .fm-files {
    flex: 1; overflow-y: auto; padding: 8px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 4px;
    align-content: start;
  }
  .fm-file {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .fm-file:hover { background: var(--hover); }
  .fm-file.selected { background: var(--active); }
  .fm-file svg { width: 36px; height: 36px; }
  .fm-file span { font-size: 10.5px; text-align: center; color: var(--text); line-height: 1.3; word-break: break-all; }
  .fm-statusbar {
    padding: 3px 10px; font-size: 11px; color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15); flex-shrink: 0;
  }

  /* ── TERMINAL ── */
  .terminal-body {
    flex: 1; background: #1a1a1a;
    font-family: var(--mono-font); font-size: 13px;
    color: #e0e0e0; overflow-y: auto;
    padding: 8px;
  }
  .terminal-line { display: flex; align-items: baseline; gap: 0; }
  .terminal-prompt { color: #87b87f; white-space: nowrap; flex-shrink: 0; }
  .terminal-path { color: #6ab0f5; white-space: nowrap; flex-shrink: 0; }
  .terminal-dollar { color: #fff; margin: 0 4px; flex-shrink: 0; }
  .terminal-output { color: #ccc; padding: 1px 0 1px 0; }
  .terminal-input-line {
    display: flex; align-items: center; margin-top: 2px;
  }
  #terminal-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--mono-font); font-size: 13px; color: #e0e0e0;
    caret-color: #87b87f;
  }

  /* ── TEXT EDITOR ── */
  .editor-menubar {
    display: flex; gap: 0;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .editor-menu-item {
    padding: 4px 10px; cursor: pointer; font-size: 12px; color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .editor-menu-item:hover { background: var(--hover); color: var(--text); }
  .editor-toolbar {
    display: flex; align-items: center; gap: 2px;
    padding: 3px 6px; background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .editor-tool-btn {
    width: 26px; height: 24px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; font-size: 12px; color: var(--text-muted);
  }
  .editor-tool-btn:hover { background: var(--hover); color: var(--text); }
  .editor-tool-sep { width: 1px; height: 18px; background: var(--panel-border); margin: 0 2px; }
  .editor-area {
    flex: 1; background: #1e2227; outline: none; border: none; resize: none;
    font-family: var(--mono-font); font-size: 13px; color: #abb2bf;
    padding: 12px; line-height: 1.6;
  }
  .editor-statusbar {
    padding: 2px 10px; font-size: 11px; color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15); flex-shrink: 0;
    display: flex; gap: 16px;
  }

  /* ── START MENU ── */
  #start-menu {
    position: fixed; bottom: 44px; left: 4px;
    width: 560px; height: 480px;
    background: rgba(32,36,42,0.97);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    box-shadow: 0 -4px 40px rgba(0,0,0,0.7);
    z-index: 9500;
    display: none;
    overflow: hidden;
  }
  #start-menu.open { display: flex; }
  .menu-left {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column;
  }
  .menu-search-bar {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .menu-search-input {
    width: 100%; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
    padding: 6px 10px; color: var(--text);
    font-family: var(--desktop-font); font-size: 12.5px; outline: none;
  }
  .menu-search-input::placeholder { color: var(--text-muted); }
  .menu-search-input:focus { border-color: var(--mint-green); }
  .menu-apps-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .menu-app-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px; cursor: pointer;
    transition: background 0.12s;
  }
  .menu-app-item:hover { background: var(--hover); }
  .menu-app-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .menu-app-item span { font-size: 13px; color: var(--text); }
  .menu-bottom {
    display: flex; gap: 0;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 6px;
  }
  .menu-bottom-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s; font-size: 12px; color: var(--text-muted);
  }
  .menu-bottom-btn:hover { background: var(--hover); color: var(--text); }
  .menu-bottom-btn svg { width: 14px; height: 14px; }
  .menu-right {
    flex: 1; display: flex; flex-direction: column; padding: 12px;
    gap: 8px;
  }
  .menu-right-section { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .menu-place {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .menu-place:hover { background: var(--hover); }
  .menu-place svg { width: 16px; height: 16px; }
  .menu-place span { font-size: 12.5px; color: var(--text); }
  .menu-user {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 8px;
  }
  .menu-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #87b87f, #5a8a52);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: #fff;
    flex-shrink: 0;
  }
  .menu-user-info .name { font-size: 14px; font-weight: 500; }
  .menu-user-info .type { font-size: 11px; color: var(--text-muted); }

  /* ── CONTEXT MENU ── */
  #context-menu {
    position: fixed;
    background: rgba(40,44,50,0.97);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 10000;
    padding: 4px 0;
    min-width: 180px;
    display: none;
  }
  #context-menu.open { display: block; }
  .ctx-item {
    padding: 6px 16px; cursor: pointer; font-size: 12.5px; color: var(--text);
    transition: background 0.12s; display: flex; align-items: center; gap: 8px;
  }
  .ctx-item:hover { background: var(--hover); }
  .ctx-item svg { width: 14px; height: 14px; color: var(--text-muted); }
  .ctx-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

  /* ── NOTIFICATION ── */
  #notifications {
    position: fixed; top: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9800; pointer-events: none;
  }
  .notif {
    background: rgba(40,44,50,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px 14px;
    width: 300px; pointer-events: all;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: notifIn 0.25s ease;
    border-left: 3px solid var(--mint-green);
  }
  @keyframes notifIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .notif-title { font-size: 12.5px; font-weight: 600; margin-bottom: 3px; }
  .notif-body { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

  /* ── SETTINGS ── */
  .settings-body { display: flex; flex: 1; overflow: hidden; }
  .settings-sidebar {
    width: 160px; flex-shrink: 0;
    background: rgba(0,0,0,0.15);
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; padding: 8px 0;
  }
  .settings-section { padding: 4px 8px 2px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .settings-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    transition: background 0.15s; font-size: 12px;
    border-radius: 3px; margin: 1px 4px;
  }
  .settings-item:hover { background: var(--hover); }
  .settings-item.active { background: var(--active); color: var(--mint-green); }
  .settings-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .settings-content {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .settings-group { margin-bottom: 24px; }
  .settings-group h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--mint-green); }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .settings-row label { font-size: 13px; color: var(--text); }
  .settings-row small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 1px; }
  .toggle {
    width: 36px; height: 20px; background: rgba(255,255,255,0.15);
    border-radius: 10px; cursor: pointer; position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--mint-green); }
  .toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; top: 2px; left: 2px;
    transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform: translateX(16px); }
  .settings-select {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 4px 8px; color: var(--text);
    font-family: var(--desktop-font); font-size: 12px; outline: none; cursor: pointer;
  }
  .settings-select option { background: #2d3035; }
  .settings-slider {
    -webkit-appearance: none; width: 120px; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .settings-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--mint-green); cursor: pointer;
  }

  /* ── SCROLLBARS ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  /* ── CALENDAR POPUP ── */
  #cal-popup {
    position: fixed; bottom: 44px; right: 4px;
    width: 240px; background: rgba(36,40,46,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
    z-index: 9500; display: none;
  }
  #cal-popup.open { display: block; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-title { font-size: 13px; font-weight: 500; }
  .cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
  .cal-nav:hover { background: var(--hover); color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .cal-dow { font-size: 10px; color: var(--text-muted); padding: 2px 0; }
  .cal-day { font-size: 11.5px; padding: 4px 2px; border-radius: 3px; cursor: pointer; transition: background 0.1s; color: var(--text); }
  .cal-day:hover { background: var(--hover); }
  .cal-day.today { background: var(--mint-green); color: #fff; font-weight: 600; }
  .cal-day.other-month { color: var(--text-muted); }
  .cal-time { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 300; color: var(--text); }

  /* ── VOLUME POPUP ── */
  #vol-popup {
    position: fixed; bottom: 44px; right: 80px;
    width: 220px; background: rgba(36,40,46,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
    z-index: 9500; display: none;
  }
  #vol-popup.open { display: block; }
  .vol-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .vol-slider {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--mint-green); cursor: pointer;
  }

  /* ── LOADING SCREEN ── */
  #boot-screen {
    position: fixed; inset: 0; z-index: 99999;
    background: #1a2619;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; transition: opacity 0.6s;
  }
  #boot-screen.fadeout { opacity: 0; pointer-events: none; }
  .boot-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .boot-logo svg { width: 80px; height: 80px; }
  .boot-logo h1 { font-size: 28px; font-weight: 300; color: #fff; letter-spacing: 2px; }
  .boot-logo p { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
  .boot-progress {
    width: 200px; height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .boot-bar { height: 100%; background: var(--mint-green); border-radius: 2px; width: 0; transition: width 0.3s; }
</style>
</head>

<script>
// ── STATE ──
let zTop = 200;
let windows = {};
let focused = null;
let calDate = new Date();

// ── BOOT ──
const bar = document.getElementById('boot-bar');
let prog = 0;
const bootInt = setInterval(() => {
  prog += Math.random() * 18 + 5;
  if (prog >= 100) {
    prog = 100; clearInterval(bootInt);
    setTimeout(() => {
      document.getElementById('boot-screen').classList.add('fadeout');
      setTimeout(() => { document.getElementById('boot-screen').remove(); showNotif('Welcome to Linux Mint', 'Cinnamon 6.0 — Ready'); }, 650);
    }, 300);
  }
  bar.style.width = prog + '%';
}, 160);

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]} ${pad(now.getDate())} ${months[now.getMonth()]}`;
  document.getElementById('cal-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
updateClock(); setInterval(updateClock, 1000);

// ── CALENDAR ──
function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${months[m]} ${y}`;
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const today = new Date();
  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) {
    const d = new Date(y,m,-(first-i-1));
    html += `<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for(let d=1;d<=days;d++) {
    const isToday = d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    html += `<div class="cal-day${isToday?' today':''}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
function calNav(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCal(); }
renderCal();

// ── VOLUME ──
function updateVol(v) {
  document.getElementById('vol-pct').textContent = v + '%';
}

// ── POPUPS ──
function togglePopup(id) {
  const el = document.getElementById(id);
  const open = el.classList.contains('open');

// ── WINDOW MANAGEMENT ──
function focusWindow(id) {
  if(focused===id) return;
  document.querySelectorAll('.window').forEach(w=>w.classList.remove('focused'));
  const win = document.getElementById('win-'+id);
  if(win) { win.classList.add('focused'); win.style.zIndex = ++zTop; focused = id; }
  document.querySelectorAll('.window-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('tb-'+id);
  if(btn) btn.classList.add('active');
}
function minimizeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(!win) return;
  const wasMin = win.classList.contains('minimized');
  win.classList.toggle('minimized');
  if(wasMin) focusWindow(id);
  else { focused = null; document.getElementById('tb-'+id)?.classList.remove('active'); }
}
function maximizeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(!win) return;
  if(win.classList.contains('maximized')) {
    win.classList.remove('maximized');
    const s = windows[id].savedPos;
    if(s) { win.style.left=s.left; win.style.top=s.top; win.style.width=s.width; win.style.height=s.height; }
  } else {
    windows[id].savedPos = { left:win.style.left, top:win.style.top, width:win.style.width, height:win.style.height };
    win.classList.add('maximized');
  }
}
function closeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(win) win.remove();
  document.getElementById('tb-'+id)?.remove();
  delete windows[id];
  focused = null;
  document.querySelectorAll('.pinned-app').forEach(p => {
    if(p.dataset.app === id) p.classList.remove('running');
  });
}

function createWindow(id, title, width, height, x, y, contentFn, iconPath) {
  if(windows[id]) { const e=document.getElementById('win-'+id); e?.classList.remove('minimized'); focusWindow(id); return; }
  windows[id] = { id, title };
  const win = document.createElement('div');
  win.className = 'window focused';
  win.id = 'win-'+id;
  win.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${++zTop}`;
  win.innerHTML = `
    <div class="titlebar" id="tb-drag-${id}">
      <div class="win-controls">
        <button class="win-btn close" onclick="closeWindow('${id}')"><i class="win-btn-icon">✕</i></button>
        <button class="win-btn minimize" onclick="minimizeWindow('${id}')"><i class="win-btn-icon">−</i></button>
        <button class="win-btn maximize" onclick="maximizeWindow('${id}')"><i class="win-btn-icon">+</i></button>
      </div>
      <svg class="win-icon" viewBox="0 0 24 24" fill="#aaa"><path d="${iconPath}"/></svg>
      <div class="win-title">${title}</div>
    </div>
    <div class="win-content" id="wc-${id}">${contentFn()}</div>
    <div class="resize-handle" id="rh-${id}"></div>
  `;
  document.getElementById('windows').appendChild(win);
  win.addEventListener('mousedown', () => focusWindow(id));
  makeDraggable(win, document.getElementById('tb-drag-'+id));
  makeResizable(win, document.getElementById('rh-'+id));
  addWindowBtn(id, title, iconPath);
  focusWindow(id);
  if(id==='terminal') initTerminal();
}

function addWindowBtn(id, title, iconPath) {
  const bar = document.getElementById('open-windows');
  const btn = document.createElement('div');
  btn.className = 'window-btn active'; btn.id = 'tb-'+id;
  btn.innerHTML = `<svg viewBox="0 0 24 24" fill="#87b87f" width="16" height="16"><path d="${iconPath}"/></svg><span>${title}</span>`;
  btn.addEventListener('click', () => {
    const win = document.getElementById('win-'+id);
    if(!win) return;
    if(focused===id && !win.classList.contains('minimized')) minimizeWindow(id);
    else { win.classList.remove('minimized'); focusWindow(id); }
  });
  bar.appendChild(btn);
}

// ── DRAG & RESIZE ──
function makeDraggable(win, handle) {
  let dx,dy,dragging=false;
  handle.addEventListener('mousedown', e => {
    if(e.target.closest('.win-controls')) return;
    if(win.classList.contains('maximized')) return;
    dragging=true; dx=e.clientX-win.offsetLeft; dy=e.clientY-win.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    win.style.left = Math.max(0,Math.min(window.innerWidth-win.offsetWidth,e.clientX-dx))+'px';
    win.style.top = Math.max(0,Math.min(window.innerHeight-win.offsetHeight-40,e.clientY-dy))+'px';
  });
  document.addEventListener('mouseup', () => dragging=false);
  handle.addEventListener('dblclick', () => maximizeWindow(win.id.replace('win-','')));
}
function makeResizable(win, handle) {
  let sx,sy,sw,sh,resizing=false;
  handle.addEventListener('mousedown', e => {
    resizing=true; sx=e.clientX; sy=e.clientY; sw=win.offsetWidth; sh=win.offsetHeight;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if(!resizing) return;
    win.style.width = Math.max(300,sw+e.clientX-sx)+'px';
    win.style.height = Math.max(200,sh+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup', () => resizing=false);
}

function initTerminal() {
  const input = document.getElementById('terminal-input');
  if(!input) return;
  input.focus();
  input.addEventListener('keydown', e => {
    if(e.key==='Enter') {
      const cmd = input.value.trim();
      input.value = '';
      if(!cmd) { appendTermLine(''); return; }
      terminalHistory.unshift(cmd); termHistIdx=-1;
      appendTermPromptLine(cmd);
      const parts = cmd.split(' ');
      const fn = termCmds[parts[0]];
      if(fn) {
        const out = fn(parts.slice(1));
        if(out===null) return;
        if(out) out.split('\n').forEach(l=>appendTermOutput(l));
      } else {
        appendTermOutput(`${parts[0]}: command not found`);
      }
      appendTermLine('');
    } else if(e.key==='ArrowUp') {
      termHistIdx = Math.min(termHistIdx+1, terminalHistory.length-1);
      input.value = terminalHistory[termHistIdx]||'';
      e.preventDefault();
    } else if(e.key==='ArrowDown') {
      termHistIdx = Math.max(termHistIdx-1,-1);
      input.value = termHistIdx>=0 ? terminalHistory[termHistIdx] : '';
      e.preventDefault();
    }
  });
}

function appendTermPromptLine(cmd) {
  const b = document.getElementById('term-body');
  if(!b) return;
  const cwd = termCwd===('~') ? '~' : termCwd.split('/').pop();

  b.appendChild(line); b.scrollTop=b.scrollHeight;
}
function appendTermOutput(html) {
  const b = document.getElementById('term-body');

  const line = document.createElement('div');
  line.className='terminal-output';
  line.innerHTML = html;
  b.appendChild(line); b.scrollTop=b.scrollHeight;
}

This is a fully functional text editor.
You can type, edit, and format your text here.

## Features

Start typing below...
</textarea>
    <div class="editor-statusbar">
      <span id="editor-pos">Ln 1, Col 1</span>
      <span>UTF-8</span>
      <span>Unix (LF)</span>
      <span id="editor-wc">Words: 0</span>
    </div>
  `;
}
function edNew() {
  const ea = document.getElementById('editor-area');
  if(ea) ea.value='';
}

        <div class="settings-section" style="margin-top:8px">System</div>
        ${[['General','M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z'],['Users','M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z']].map(([l,i])=>`<div class="settings-item" onclick="settingsSelect(this,'${l}')">${svgIcon(i,14)}${l}</div>`).join('')}

function svgIcon(path, size=16) {
  return `<svg viewBox="0 0 24 24" fill="currentColor" width="${size}" height="${size}" style="flex-shrink:0"><path d="${path}"/></svg>`;
}
function settingsSelect(el, name) {
  document.querySelectorAll('.settings-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

// ── OPEN APPS ──
let winOffsetX = 40, winOffsetY = 40;
function openApp(id) {
  const configs = {
    files: { title:'Files', w:720, h:480, icon:'M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z', fn: filesContent },
    terminal: { title:'Terminal', w:650, h:400, icon:'M20 3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2z', fn: terminalContent },
    editor: { title:'Text Editor', w:680, h:500, icon:'M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11z', fn: editorContent },
    settings: { title:'System Settings', w:700, h:460, icon:'M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z', fn: settingsContent },
  };
  const cfg = configs[id];
  if(!cfg) return;
  const x = Math.min(60 + (winOffsetX % 200), window.innerWidth - cfg.w - 20);
  const y = Math.min(40 + (winOffsetY % 160), window.innerHeight - cfg.h - 60);
  winOffsetX += 24; winOffsetY += 24;
  createWindow(id, cfg.title, cfg.w, cfg.h, x, y, cfg.fn, cfg.icon);
  if(id==='files') setTimeout(fmRender, 50);
  if(id==='editor') setTimeout(setupEditor, 50);
  // mark pinned
  document.querySelectorAll('.pinned-app').forEach(p=>{ if(p.title===cfg.title) p.classList.add('running'); });
  document.getElementById('start-menu').classList.remove('open');
}

function setupEditor() {
  const ea = document.getElementById('editor-area');
  const pos = document.getElementById('editor-pos');
  const wc = document.getElementById('editor-wc');
  if(!ea) return;
  ea.addEventListener('keyup', () => {
    if(pos) {
      const text = ea.value.substring(0, ea.selectionStart);
      const lines = text.split('\n');
      pos.textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length+1}`;
    }
    if(wc) wc.textContent = `Words: ${ea.value.trim().split(/\s+/).filter(Boolean).length}`;
  });
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key==='F1') { e.preventDefault(); openApp('files'); }
  if(e.ctrlKey && e.key==='F2') { e.preventDefault(); openApp('terminal'); }
  if(e.ctrlKey && e.key==='F3') { e.preventDefault(); openApp('editor'); }
  if(e.key==='Super'||e.key==='Meta') { e.preventDefault(); toggleMenu(); }
  if(e.altKey && e.key==='F4' && focused) { e.preventDefault(); closeWindow(focused); }
});
</script>
