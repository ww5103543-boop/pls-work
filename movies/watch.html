<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Sunlit - Watch</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.10.3/cdn.min.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Solid color palette - no gradients */
        .bg-primary { background: #0a0a0a; }
        .bg-secondary { background: #141414; }
        .bg-tertiary { background: #1f1f1f; }
        .bg-card { background: #1a1a1a; }
        .bg-card-hover { background: #252525; }
        
        .text-primary { color: #ffffff; }
        .text-secondary { color: #a0a0a0; }
        .text-muted { color: #666666; }
        
        .border-subtle { border-color: #2a2a2a; }
        .border-hover { border-color: #3a3a3a; }
        
        .accent-blue { color: #3b82f6; }
        .bg-accent { background: #3b82f6; }
        .border-accent { border-color: #3b82f6; }
        
        /* Video player container */
        .player-container {
            background: #000000;
            border: 1px solid #2a2a2a;
            position: relative;
            overflow: hidden;
        }
        
        /* Info card */
        .info-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }
        
        /* Back button */
        .back-link {
            color: #888888;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: color 0.2s;
        }
        
        .back-link:hover {
            color: #cccccc;
        }
        
        /* Server buttons */
        .server-btn {
            background: #141414;
            border: 1px solid #2a2a2a;
            color: #a0a0a0;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            text-align: left;
        }
        
        .server-btn:hover {
            background: #1a1a1a;
            border-color: #3a3a3a;
            color: #ffffff;
        }
        
        .server-btn.active {
            background: #1a1a1a;
            border-color: #3b82f6;
            color: #ffffff;
        }
        
        /* Season/Episode buttons */
        .season-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
        }
        
        .season-btn {
            background: #111111;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid #2a2a2a;
            color: #cccccc;
        }
        
        .season-btn:hover {
            background: #1a1a1a;
            border-color: #444444;
        }
        
        .season-btn.active {
            background: #333333;
            border-color: #666666;
            color: white;
        }
        
        .episode-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .episode-btn {
            background: #111111;
            padding: 8px 14px;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            min-width: 50px;
            transition: all 0.2s;
            border: 1px solid #2a2a2a;
            color: #cccccc;
        }
        
        .episode-btn:hover {
            background: #1a1a1a;
            border-color: #444444;
        }
        
        .episode-btn.active {
            background: #333333;
            border-color: #666666;
            color: white;
        }
        
        .episode-grid::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        
        .episode-grid::-webkit-scrollbar-track {
            background: #111111;
            border-radius: 10px;
        }
        
        .episode-grid::-webkit-scrollbar-thumb {
            background: #444444;
            border-radius: 10px;
        }
        
        /* Metadata tags */
        .meta-tag {
            background: #141414;
            border: 1px solid #2a2a2a;
            color: #a0a0a0;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        
        /* Loading spinner */
        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #2a2a2a;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Popup toast */
        .popup-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a1a1a;
            color: #e5e5e5;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            border: 1px solid #333333;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #3a3a3a;
        }
        
        /* Footer */
        .footer {
            background: #0a0a0a;
            border-top: 1px solid #1f1f1f;
        }
        
        /* Rating star */
        .star-icon {
            color: #fbbf24;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #888888;
        }
    </style>
</head>
<body class="min-h-screen" x-data="app()">
    <div class="container mx-auto px-4 py-8 max-w-6xl" x-init="init()">
        
        <!-- Top Bar with Back Link -->
        <div class="mb-6">
            <a href="./" class="back-link">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
                Back to Browse
            </a>
        </div>
        
        <div x-show="content">
            <!-- Title -->
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-3" x-text="content?.title || content?.name"></h1>
            
            <!-- Info Row -->
            <div class="flex flex-wrap items-center gap-2 mb-6">
                <span class="meta-tag" x-text="contentType === 'tv' ? (content?.first_air_date?.split('-')[0] || 'N/A') : (content?.release_date?.split('-')[0] || 'N/A')"></span>
                <span class="meta-tag flex items-center gap-1">
                    <svg class="w-3 h-3 star-icon" fill="currentColor" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                    </svg>
                    <span x-text="content?.vote_average?.toFixed(1) || 'N/A'"></span>
                </span>
                <span class="meta-tag" x-text="contentType === 'tv' ? 'TV Series' : 'Movie'"></span>
            </div>
            
            <!-- Video Player -->
            <div class="player-container rounded-lg mb-6 relative" x-ref="videoContainer">
                <!-- Loading State -->
                <div x-show="isLoading" class="absolute inset-0 flex items-center justify-center bg-black z-20">
                    <div class="spinner"></div>
                </div>
                
                <!-- Video iframe -->
                <div class="relative pt-[56.25%]">
                    <iframe 
                        :src="currentVideoUrl" 
                        x-ref="videoIframe"
                        class="absolute top-0 left-0 w-full h-full border-0" 
                        allowfullscreen
                        allow="autoplay; encrypted-media; picture-in-picture"
                        @load="isLoading = false"
                    ></iframe>
                </div>
            </div>

            <!-- TV Season/Episode Selector -->
            <div class="info-card rounded-lg p-6 mb-6" x-show="contentType === 'tv' && seasons.length > 0">
                <h3 class="text-lg font-semibold text-white mb-4">Seasons & Episodes</h3>
                
                <div class="season-row">
                    <template x-for="season in seasons" :key="season.season_number">
                        <div @click="selectSeason(season.season_number)"
                            class="season-btn"
                            :class="selectedSeason === season.season_number ? 'active' : ''"
                            x-text="'S' + season.season_number"></div>
                    </template>
                </div>
                
                <div x-show="episodesLoading" class="loading">Loading episodes...</div>
                
                <div x-show="episodes.length > 0">
                    <div class="episode-grid">
                        <template x-for="episode in episodes" :key="episode.episode_number">
                            <div @click="selectEpisode(episode.episode_number)"
                                class="episode-btn"
                                :class="selectedEpisode === episode.episode_number ? 'active' : ''"
                                x-text="episode.episode_number"></div>
                        </template>
                    </div>
                </div>
            </div>

            <!-- Overview -->
            <div class="info-card rounded-lg p-6 mb-6">
                <h3 class="text-lg font-semibold text-white mb-3">Overview</h3>
                <p class="text-secondary leading-relaxed" x-text="content?.overview || 'No overview available.'"></p>
            </div>
            
            <!-- Server Selection -->
            <div class="info-card rounded-lg p-6">
                <h3 class="text-lg font-semibold text-white mb-4">Video Source</h3>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                    <template x-for="source in sources" :key="source.id">
                        <button 
                            @click="selectedSource = source.id; updateVideoUrl()"
                            :class="selectedSource === source.id ? 'active' : ''"
                            class="server-btn"
                        >
                            <div class="font-medium" x-text="source.name"></div>
                            <div class="text-xs text-muted mt-1" x-text="source.id === 'vidlink' ? 'Primary' : (source.id === 'videasy' ? 'Backup 1' : 'Backup 2')"></div>
                        </button>
                    </template>
                </div>
            </div>
        </div>
        
        <!-- Loading Content State -->
        <div x-show="!content" class="flex items-center justify-center py-20">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer mt-12 py-6 px-6 text-center">
        <p class="text-muted text-xs">
            Sunlit does not host or upload any videos. All content is provided by third-party embedding services.
            <a href="/credits.html" class="text-secondary hover:text-white transition-colors ml-2">Credits</a>
        </p>
    </div>

    <script>
        const sources = [
            { id: 'vidlink', name: 'VidLink', urls: { movie: 'https://vidlink.pro/movie/{id}', tv: 'https://vidlink.pro/tv/{id}/{season}/{episode}' } },
            { id: 'videasy', name: 'VidEasy', urls: { movie: 'https://player.videasy.net/movie/{id}?color=8834ec', tv: 'https://player.videasy.net/tv/{id}/{season}/{episode}?color=8834ec' } },
            { id: 'vidora', name: 'Vidora', urls: { movie: 'https://vidora.su/movie/{id}', tv: 'https://vidora.su/tv/{id}/{season}/{episode}' } }
        ];

        let popupBlockCount = 0;

        const adNetworkDomains = [
            'doubleclick.net', 'googleadservices.com', 'googlesyndication.com',
            'exoclick.com', 'popads.net', 'adsterra.com', 'intellipopup.com',
            'imasdk.googleapis.com', 'oundhertobeconsist.org', 'continue-download.com',
            'ouraidream.com', 'zsjqcvphoansc.com', 'bfvbaujlrhlep.com',
            'siophientic.com', 'bestadblocker.net', 'wickedsetup.com'
        ];

        function isAdNetworkUrl(url) {
            if (!url) return false;
            const lower = url.toLowerCase();
            return adNetworkDomains.some(domain => lower.includes(domain));
        }

        function showPopupToast() {
            popupBlockCount++;
            let toast = document.querySelector('.popup-toast');
            if (toast) toast.remove();
            toast = document.createElement('div');
            toast.className = 'popup-toast';
            toast.innerHTML = `🚫 Blocked ${popupBlockCount} popup${popupBlockCount !== 1 ? 's' : ''}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.open = function() { showPopupToast(); return null; };

        document.addEventListener('click', function(e) {
            let target = e.target.closest('a');
            if (target && target.target === '_blank') {
                e.preventDefault();
                showPopupToast();
                return false;
            }
        }, true);

        function app() {
            return {
                apiKey: 'fb7bb23f03b6994dafc674c074d01761',
                content: null,
                contentId: null,
                contentType: null,
                selectedSource: 'vidlink',
                sources: sources,
                currentVideoUrl: '',
                popupInterval: null,
                selectedSeason: 1,
                selectedEpisode: 1,
                seasons: [],
                episodes: [],
                episodesLoading: false,
                isLoading: true,

                get currentSourceName() {
                    const source = this.sources.find(s => s.id === this.selectedSource);
                    return source ? source.name : 'VidLink';
                },

                async init() {
                    const urlParams = new URLSearchParams(window.location.search);
                    this.contentId = urlParams.get('id');
                    this.contentType = urlParams.get('type');
                    
                    if (this.contentId && this.contentType) {
                        await this.fetchContent();
                        if (this.contentType === 'tv') {
                            await this.fetchSeasons();
                        }
                        this.updateVideoUrl();
                    }
                    
                    this.startIframeCleanup();
                },
                
                startIframeCleanup() {
                    this.popupInterval = setInterval(() => {
                        this.cleanIframe();
                    }, 500);
                },
                
                cleanIframe() {
                    try {
                        const iframe = this.$refs.videoIframe;
                        if (!iframe) return;
                        
                        const iframeWindow = iframe.contentWindow;
                        if (iframeWindow) {
                            iframeWindow.open = function() { showPopupToast(); return null; };
                        }
                    } catch(e) {}
                },

                async fetchContent() {
                    const url = `https://api.themoviedb.org/3/${this.contentType}/${this.contentId}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        this.content = await response.json();
                    } catch (error) {
                        console.error('Error fetching content:', error);
                    }
                },

                async fetchSeasons() {
                    const url = `https://api.themoviedb.org/3/tv/${this.contentId}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        this.seasons = data.seasons.filter(s => s.season_number > 0);
                        if (this.seasons.length > 0) {
                            this.selectedSeason = this.seasons[0].season_number;
                            await this.fetchEpisodes();
                        }
                    } catch (error) {
                        console.error('Error fetching seasons:', error);
                    }
                },

                async fetchEpisodes() {
                    this.episodesLoading = true;
                    const url = `https://api.themoviedb.org/3/tv/${this.contentId}/season/${this.selectedSeason}?api_key=${this.apiKey}`;
                    try {
                        const response = await fetch(url);
                        const data = await response.json();
                        this.episodes = data.episodes;
                        if (this.episodes.length > 0) {
                            this.selectedEpisode = this.episodes[0].episode_number;
                            this.updateVideoUrl();
                        }
                    } catch (error) {
                        console.error('Error fetching episodes:', error);
                    } finally {
                        this.episodesLoading = false;
                    }
                },

                async selectSeason(seasonNum) {
                    if (this.selectedSeason === seasonNum) return;
                    this.selectedSeason = seasonNum;
                    await this.fetchEpisodes();
                },

                selectEpisode(episodeNum) {
                    if (this.selectedEpisode === episodeNum) return;
                    this.selectedEpisode = episodeNum;
                    this.updateVideoUrl();
                },

                updateVideoUrl() {
                    const source = this.sources.find(s => s.id === this.selectedSource);
                    if (!source) return;
                    
                    let url;
                    if (this.contentType === 'movie') {
                        url = source.urls.movie.replace('{id}', this.contentId);
                    } else {
                        url = source.urls.tv
                            .replace('{id}', this.contentId)
                            .replace('{season}', this.selectedSeason)
                            .replace('{episode}', this.selectedEpisode);
                    }
                    
                    this.currentVideoUrl = url;
                    this.isLoading = true;
                    
                    setTimeout(() => this.cleanIframe(), 100);
                    setTimeout(() => this.cleanIframe(), 500);
                    setTimeout(() => this.cleanIframe(), 1000);
                    setTimeout(() => this.cleanIframe(), 2000);
                    setTimeout(() => this.cleanIframe(), 5000);
                },
                
                destroy() {
                    if (this.popupInterval) {
                        clearInterval(this.popupInterval);
                    }
                }
            }
        }
        
        window.addEventListener('beforeunload', () => {
            if (window.app && window.app.destroy) {
                window.app.destroy();
            }
        });
    </script>


</body>
</html>
