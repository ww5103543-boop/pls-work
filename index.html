<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sunlit</title>
  <link rel="icon" href="data:,">
  
  <meta http-equiv="Content-Security-Policy" content="frame-src * https: http:; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob:; style-src * 'unsafe-inline';">

  <script src="/ximplesc/ximple.mjs" type="module" id="ximple-module"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0a0a0a;
      --chrome-bg: rgba(12, 12, 16, 0.92);
      --chrome-border: rgba(255, 255, 255, 0.07);
      --tab-bg: rgba(255, 255, 255, 0.04);
      --tab-active-bg: rgba(255, 255, 255, 0.1);
      --tab-active-border: rgba(255, 255, 255, 0.2);
      --text: #b0b0b8;
      --text-dim: #6e6e7a;
      --text-bright: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    body.fullscreen-mode {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--bg);
    }

    body.fullscreen-mode #tab-container,
    body.fullscreen-mode #toolbar {
      display: none;
    }

    body.fullscreen-mode #web-container {
      position: fixed;
      inset: 0;
      z-index: 10000;
    }

    #exit-fullscreen-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 80px;
      height: 80px;
      z-index: 10001;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    body.fullscreen-mode #exit-fullscreen-overlay {
      pointer-events: auto;
    }

    #exit-fullscreen-overlay:hover {
      opacity: 1;
    }

    #exit-fullscreen-btn {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 36px;
      height: 36px;
      background: rgba(12, 12, 16, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: var(--text-bright);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    #exit-fullscreen-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }

    #tab-container {
      background: var(--chrome-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 5px;
      overflow-x: auto;
      flex-shrink: 0;
    }

    .tab {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 0 12px;
      height: 34px;
      min-width: 130px;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .tab.active .tab-title {
      color: var(--text-bright);
    }

    .tab-title {
      flex: 1;
      font-size: 12px;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      border-radius: 3px;
      object-fit: contain;
      background: rgba(255,255,255,0.06);
    }

    .tab-close {
      width: 21px;
      height: 21px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 5px;
      font-size: 12px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .tab-close:hover {
      background: rgba(255,255,255,0.12);
      color: white;
    }

    #new-tab-btn {
      width: 25px;
      height: 25px;
      background: transparent;
      border: none;
      border-radius: 5px;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex-shrink: 0;
    }

    #new-tab-btn:hover {
      background: rgba(255,255,255,0.08);
      color: white;
    }

    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(10, 10, 10, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }

    .nav-icon {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
    }

    .nav-icon:hover {
      background: rgba(255,255,255,0.07);
      color: white;
    }

    #url-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      padding: 0 12px;
      gap: 7px;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-bright);
      font-size: 13px;
      padding: 7px 0;
    }

    #url-input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #url-wrapper .loading-icon {
      animation: spin 0.45s linear infinite;
      opacity: 1;
      transition: opacity 0.2s;
    }

    #url-wrapper .loading-icon.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #fullscreen-btn {
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      border-radius: 7px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    #fullscreen-btn:hover {
      background: rgba(255,255,255,0.07);
      color: white;
    }

    #menu-dots {
      width: 30px;
      height: 30px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    #web-container {
      flex: 1;
      position: relative;
      background: #0f0f12;
      overflow: hidden;
      min-height: 0;
    }

    .new-tab-page {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .new-tab-page.active {
      display: flex;
    }

    .nt-greeting {
      font-size: 32px;
      font-weight: 600;
      background: linear-gradient(135deg, #eaeef5, #b0b0c8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nt-search-area {
      width: 80%;
      max-width: 500px;
      margin-top: 20px;
    }

    .nt-search {
      width: 100%;
      background: rgba(22,22,30,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 44px;
      padding: 12px 20px;
      color: white;
      font-size: 14px;
      outline: none;
    }

    .nt-search:focus {
      border-color: rgba(255,255,255,0.18);
    }

    .browser-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    .browser-frame.active {
      display: block;
    }

    #dropdown-menu {
      position: fixed;
      top: 92px;
      right: 12px;
      background: rgba(12,12,12,0.98);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 11px;
      padding: 5px;
      min-width: 200px;
      z-index: 2000;
      display: none;
    }

    #dropdown-menu.open {
      display: block;
    }

    .dd-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
      width: 100%;
      background: transparent;
      border: none;
    }

    .dd-item:hover {
      background: rgba(255,255,255,0.07);
      color: white;
    }

    .dd-sub {
      margin-left: auto;
      font-size: 11px;
    }

    .dd-sep {
      height: 1px;
      background: rgba(255,255,255,0.07);
      margin: 4px 0;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(12px);
      z-index: 3000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal-card {
      background: #14141c;
      border: 1px solid #2c2c38;
      border-radius: 28px;
      padding: 28px;
      width: 340px;
    }

    .modal-card h3 {
      color: white;
      margin-bottom: 20px;
    }

    .settings-row {
      margin-bottom: 20px;
    }

    .settings-row label {
      font-size: 11px;
      color: #8e8e9e;
      display: block;
      margin-bottom: 6px;
    }

    .settings-row input,
    .settings-row select {
      width: 100%;
      background: #20202a;
      border: 1px solid #343440;
      border-radius: 14px;
      padding: 10px 14px;
      color: white;
      font-family: monospace;
      outline: none;
    }

    .settings-row select {
      font-family: inherit;
      cursor: pointer;
    }

    .modal-buttons {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-btn {
      flex: 1;
      background: #2a2a36;
      border: none;
      padding: 10px;
      border-radius: 30px;
      color: white;
      cursor: pointer;
    }

    .modal-btn:hover {
      background: #383848;
    }

    .toast-msg {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(28, 28, 38, 0.9);
      backdrop-filter: blur(16px);
      padding: 8px 20px;
      border-radius: 40px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 4000;
      color: var(--text-bright);
    }

    .toast-msg.show {
      opacity: 1;
    }
  </style>

<body>

  <div id="toast-message" class="toast-msg"></div>

  <script>
    // --- FAST, NON-BLOCKING PROXY INIT ---
    
    let proxyModule = null;
    let proxyReady = false;
    let proxyInitPromise = null;
    let toastTimer = null;
    const toastEl = document.getElementById('toast-message');

    function showToast(msg, duration = 1800) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
    }

    // Enable UI immediately - no waiting for proxy
    const urlInput = document.getElementById('url-input');
    const loadingIcon = document.querySelector('.loading-icon');
    if (urlInput) urlInput.disabled = false;
    if (loadingIcon) loadingIcon.classList.add('hidden');

    async function initProxy() {
      if (proxyInitPromise) return proxyInitPromise;
      if (proxyReady) return proxyModule;

      proxyInitPromise = (async () => {
        try {
          const m = await import("/ximplesc/ximple.mjs");
          proxyModule = m;

          const w = localStorage.getItem('wispServer') || "wss://wisp.waved.site/";
          const t = localStorage.getItem('transport') || "libcurl";

          // Parallel config, not sequential
          await Promise.all([
            m.setWisp?.(w).catch(() => {}),
            m.setTransport?.(t).catch(() => {})
          ]);

          proxyReady = true;
          showToast('Proxy ready', 1200);
          console.log("[sunlit] proxy initialized");
          return m;
        } catch(e) {
          console.error("[sunlit] proxy init failed:", e);
          showToast('Proxy failed to load', 3000);
          throw e;
        }
      })();

      return proxyInitPromise;
    }

    // Start loading in background immediately
    initProxy();

    window.proxyModule = () => proxyModule;
    window.proxyReady = () => proxyReady;
    window.initProxy = initProxy;
    window.showToast = showToast;
  </script>

  <script type="module">
    async function getProxied(url) {
      if (!window.proxyReady()) await window.initProxy();
      const module = window.proxyModule();
      if (!module?.getProxied) throw new Error("Proxy not available");
      return module.getProxied(url);
    }

    function getProxiedSync(url) {
      if (!window.proxyReady() || !window.proxyModule()?.getProxiedSync) throw new Error("Proxy not ready");
      return window.proxyModule().getProxiedSync(url);
    }

    async function setWisp(url) {
      if (!window.proxyReady()) await window.initProxy();
      const module = window.proxyModule();
      if (module?.setWisp) return module.setWisp(url);
    }

    async function setTransport(t) {
      if (!window.proxyReady()) await window.initProxy();
      const module = window.proxyModule();
      if (module?.setTransport) return module.setTransport(t);
    }

    const tabContainer = document.getElementById('tab-container');
    const newTabBtn = document.getElementById('new-tab-btn');
    const contentDiv = document.getElementById('web-container');
    const urlInput = document.getElementById('url-input');
    const backBtn = document.getElementById('back-btn');
    const forwardBtn = document.getElementById('forward-btn');
    const reloadBtn = document.getElementById('reload-btn');
    const menuBtn = document.getElementById('menu-dots');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const exitFullscreenBtn = document.getElementById('exit-fullscreen-btn');
    const dropdown = document.getElementById('dropdown-menu');
    const ddDuck = document.getElementById('dd-duck');
    const ddBrave = document.getElementById('dd-brave');
    const duckCheck = document.getElementById('duck-check');
    const braveCheck = document.getElementById('brave-check');
    const ddSettings = document.getElementById('dd-settings');
    const settingsModal = document.getElementById('settings-modal');
    const wispInput = document.getElementById('wisp-url');
    const transportSelect = document.getElementById('transport-select');
    const closeSettingsBtn = document.getElementById('close-settings');
    const saveSettingsBtn = document.getElementById('save-settings');
    const toastEl = document.getElementById('toast-message');
    const loadingIcon = document.querySelector('.loading-icon');

    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;
    let searchEngine = localStorage.getItem('searchEngine') || 'duckduckgo';
    let toastTimer = null;
    let isFullscreen = false;

    function showToast(msg, duration = 1800) {
      if (!toastEl) return;
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.classList.remove('show'); }, duration);
    }

    function toggleFullscreen() {
      if (!isFullscreen) {
        document.body.classList.add('fullscreen-mode');
        fullscreenBtn.textContent = '✕';
        fullscreenBtn.title = 'Exit Fullscreen';
        isFullscreen = true;
        showToast('Fullscreen mode enabled', 1500);
      } else {
        document.body.classList.remove('fullscreen-mode');
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.title = 'Fullscreen';
        isFullscreen = false;
        showToast('Fullscreen mode disabled', 1500);
      }
    }

    function exitFullscreen() {
      if (isFullscreen) {
        document.body.classList.remove('fullscreen-mode');
        fullscreenBtn.textContent = '⛶';
        fullscreenBtn.title = 'Fullscreen';
        isFullscreen = false;
        showToast('Fullscreen mode disabled', 1500);
      }
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
    }

    function getSearchPlaceholder() {
      return searchEngine === 'brave' ? 'Search Brave or enter URL...' : 'Search DuckDuckGo or enter URL...';
    }

    function buildDestUrl(raw) {
      let s = raw.trim();
      if (!s) return null;
      if (/^https?:\/\//i.test(s)) return s;
      if (/^[a-zA-Z0-9-]+\.[a-zA-Z]{2,}/.test(s) && !s.includes(' ')) return 'https://' + s;
      return searchEngine === 'brave'
        ? 'https://search.brave.com/search?q=' + encodeURIComponent(s)
        : 'https://duckduckgo.com/?q=' + encodeURIComponent(s);
    }

    function getTabIconUrl(tab) {
      const u = tab.destUrl || tab.displayUrl || '';
      try {
        const host = new URL(u).hostname;
        if (host) return 'https://www.google.com/s2/favicons?sz=32&domain=' + encodeURIComponent(host);
      } catch (_) {}
      return '';
    }

    function renderTabs() {
      tabContainer.querySelectorAll('.tab').forEach(el => el.remove());
      for (let tab of tabs) {
        let tabEl = document.createElement('div');
        tabEl.className = 'tab' + (tab.id === activeTabId ? ' active' : '');
        const iconUrl = getTabIconUrl(tab);
        const iconHtml = iconUrl ? '<img class="tab-icon" alt="" src="' + escapeHtml(iconUrl) + '" onerror="this.style.visibility=\'hidden\'">' : '';
        tabEl.innerHTML = iconHtml + '<span class="tab-title">' + escapeHtml(tab.title) + '</span><span class="tab-close" data-id="' + tab.id + '">&#x2715;</span>';
        tabEl.addEventListener('click', e => {
          if (!e.target.classList.contains('tab-close')) switchTab(tab.id);
        });
        tabEl.querySelector('.tab-close').addEventListener('click', e => {
          e.stopPropagation();
          closeTab(tab.id);
        });
        tabContainer.insertBefore(tabEl, newTabBtn);
      }
    }

    function switchTab(id) {
      activeTabId = id;
      for (let t of tabs) {
        let isActive = t.id === id;
        t.frame.classList.toggle('active', isActive && !!t.proxiedUrl);
        t.newtab.classList.toggle('active', isActive && !t.proxiedUrl);
      }
      let activeTab = tabs.find(t => t.id === id);
      urlInput.value = activeTab ? (activeTab.displayUrl || '') : '';
      renderTabs();
    }

    function closeTab(id) {
      let idx = tabs.findIndex(t => t.id === id);
      if (idx === -1) return;
      let tab = tabs[idx];
      if (tab._loadTimer) clearTimeout(tab._loadTimer);
      tab.frame.remove();
      tab.newtab.remove();
      tabs.splice(idx, 1);
      if (tabs.length === 0) {
        createTab();
        return;
      }
      if (activeTabId === id) {
        switchTab(tabs[Math.min(idx, tabs.length - 1)].id);
      } else {
        renderTabs();
      }
    }

    async function doNavigate(tab, destUrl) {
      if (!destUrl) return;

      let proxied = null;
      if (window.proxyReady() && getProxiedSync) {
        try { proxied = getProxiedSync(destUrl); } catch (_) {}
      }

      if (proxied) {
        tab.proxiedUrl = proxied;
        tab.destUrl = destUrl;
        tab.frame.src = proxied;
        tab.newtab.classList.remove('active');
        if (activeTabId === tab.id) tab.frame.classList.add('active');
      }

      tab.loadState = 'loading';
      tab.title = 'Loading…';
      tab.displayUrl = destUrl;
      if (activeTabId === tab.id) urlInput.value = destUrl;
      renderTabs();

      if (proxied) {
        tab.frame.onload = onFrameLoad;
        tab.frame.onerror = onFrameError;
        return;
      }

      if (!window.proxyReady()) {
        showToast('Initializing proxy...', 2000);
        await window.initProxy();
      }

      if (!window.proxyReady()) {
        showToast('Proxy not available', 3000);
        tab.loadState = 'error';
        tab.title = 'Error';
        renderTabs();
        return;
      }

      try {
        proxied = await getProxied(destUrl);
      } catch (err) {
        showToast('Proxy error: ' + (err?.message ?? String(err)), 3000);
        tab.loadState = 'error';
        tab.title = 'Failed';
        renderTabs();
        return;
      }

      if (!proxied) {
        showToast('Proxy returned empty', 3000);
        return;
      }

      tab.proxiedUrl = proxied;
      tab.destUrl = destUrl;

      tab.frame.onload = onFrameLoad;
      tab.frame.onerror = onFrameError;
      tab.frame.src = proxied;
      tab.newtab.classList.remove('active');
      if (activeTabId === tab.id) tab.frame.classList.add('active');

      function onFrameLoad() {
        tab.loadState = 'loaded';
        tab.retryCount = 0;
        let resolvedDisplay = destUrl;
        try {
          let href = tab.frame.contentWindow?.location?.href || '';
          let match = href.match(/\/scramjet\/(.+)$/);
          if (match) resolvedDisplay = decodeURIComponent(match[1]);
        } catch(_) {}
        tab.displayUrl = resolvedDisplay;
        try {
          tab.title = new URL(resolvedDisplay).hostname.replace(/^www\./, '') || 'Page';
        } catch(_) {
          tab.title = 'Page';
        }
        if (activeTabId === tab.id) urlInput.value = tab.displayUrl;
        renderTabs();
      }

      function onFrameError() {
        tab.loadState = 'error';
        tab.title = 'Error';
        renderTabs();
      }
    }

    async function navigateTab(tabId, raw) {
      raw = (raw || '').trim();
      if (!raw) return;
      let tab = tabs.find(t => t.id === tabId);
      if (!tab) return;
      let destUrl = buildDestUrl(raw);
      if (!destUrl) return;
      tab.retryCount = 0;
      await doNavigate(tab, destUrl);
    }

    function createTab(initialUrl) {
      let id = ++tabCounter;

      let frame = document.createElement('iframe');
      frame.className = 'browser-frame';
      frame.setAttribute('allow', 'fullscreen; microphone; camera; autoplay; clipboard-read; clipboard-write; accelerometer; gyroscope; payment; usb; xr-spatial-tracking');
      contentDiv.appendChild(frame);

      let newtabDiv = document.createElement('div');
      newtabDiv.className = 'new-tab-page';
      newtabDiv.innerHTML = '<div class="nt-greeting">Sunlit</div><div class="nt-search-area"><input class="nt-search" type="text" placeholder="' + escapeHtml(getSearchPlaceholder()) + '" autocomplete="off" spellcheck="false"></div>';
      contentDiv.appendChild(newtabDiv);

      let tabObj = {
        id, frame, newtab: newtabDiv,
        title: 'New Tab',
        proxiedUrl: null, destUrl: null, displayUrl: '',
        loadState: 'idle', retryCount: 0, _loadTimer: null
      };
      tabs.push(tabObj);

      let ntInput = newtabDiv.querySelector('.nt-search');
      ntInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && ntInput.value.trim()) {
          navigateTab(id, ntInput.value);
        }
      });

      renderTabs();
      switchTab(id);

      if (initialUrl) {
        navigateTab(id, initialUrl);
      } else {
        setTimeout(() => ntInput.focus(), 50);
      }

      return id;
    }

    function updateEngineUI() {
      duckCheck.textContent = searchEngine === 'duckduckgo' ? '✓' : '';
      braveCheck.textContent = searchEngine === 'brave' ? '✓' : '';
      let ph = getSearchPlaceholder();
      urlInput.placeholder = ph;
      document.querySelectorAll('.nt-search').forEach(el => { el.placeholder = ph; });
    }

    urlInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && urlInput.value.trim()) {
        navigateTab(activeTabId, urlInput.value);
      }
    });

    newTabBtn.addEventListener('click', () => createTab());

    backBtn.addEventListener('click', () => {
      let tab = tabs.find(t => t.id === activeTabId);
      try { tab?.frame?.contentWindow?.history.back(); } catch(_) {}
    });

    forwardBtn.addEventListener('click', () => {
      let tab = tabs.find(t => t.id === activeTabId);
      try { tab?.frame?.contentWindow?.history.forward(); } catch(_) {}
    });

    reloadBtn.addEventListener('click', () => {
      let tab = tabs.find(t => t.id === activeTabId);
      if (tab?.destUrl) navigateTab(activeTabId, tab.destUrl);
    });

    fullscreenBtn.addEventListener('click', toggleFullscreen);
    exitFullscreenBtn.addEventListener('click', exitFullscreen);

    ddDuck.addEventListener('click', () => {
      searchEngine = 'duckduckgo';
      localStorage.setItem('searchEngine', 'duckduckgo');
      updateEngineUI();
      dropdown.classList.remove('open');
    });

    ddBrave.addEventListener('click', () => {
      searchEngine = 'brave';
      localStorage.setItem('searchEngine', 'brave');
      updateEngineUI();
      dropdown.classList.remove('open');
    });

    ddSettings.addEventListener('click', () => {
      wispInput.value = localStorage.getItem('wispServer') || 'wss://wisp.waved.site/';
      transportSelect.value = localStorage.getItem('transport') || 'libcurl';
      settingsModal.classList.add('open');
      dropdown.classList.remove('open');
    });

    menuBtn.addEventListener('click', e => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });

    document.addEventListener('click', () => {
      dropdown.classList.remove('open');
    });

    closeSettingsBtn.addEventListener('click', () => {
      settingsModal.classList.remove('open');
    });

    saveSettingsBtn.addEventListener('click', async () => {
      let newWisp = wispInput.value.trim();
      let newTransport = transportSelect.value;
      if (newWisp) {
        localStorage.setItem('wispServer', newWisp);
        if (setWisp) await setWisp(newWisp);
      }
      localStorage.setItem('transport', newTransport);
      if (setTransport) await setTransport(newTransport);
      showToast('Settings saved');
      settingsModal.classList.remove('open');
    });

    updateEngineUI();
    createTab();
  </script>
</body>
