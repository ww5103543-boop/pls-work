<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sunlit</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="exit-fs-overlay">
  <button id="exit-fs-btn">✕</button>
</div>

<div id="tab-bar">
  <button id="new-tab">+</button>
</div>

<div id="toolbar">
  <button class="nav-btn" id="back-btn">←</button>
  <button class="nav-btn" id="forward-btn">→</button>
  <button class="nav-btn" id="reload-btn">↻</button>
  <div id="url-box">
    <input id="url-input" type="text" placeholder="Search or type URL" autocomplete="off">
    <div id="loading-spinner" class="spinner hidden"></div>
  </div>
  <button id="fs-btn">⛶</button>
  <button id="menu-btn">⋮</button>
</div>

<div id="web-container"></div>

<div id="dropdown">
  <button class="dd-item" id="dd-duck">DuckDuckGo <span id="duck-check"></span></button>
  <button class="dd-item" id="dd-brave">Brave Search <span id="brave-check"></span></button>
  <div class="sep"></div>
  <button class="dd-item" id="dd-settings">Settings</button>
</div>

<div id="settings-modal" class="modal">
  <div class="modal-card">
    <h3>Settings</h3>
    <div class="settings-row">
      <label>Wisp Server</label>
      <input id="wisp-url" type="text" placeholder="wss://wisp.example.com/">
    </div>
    <div class="settings-row">
      <label>Transport</label>
      <select id="transport-select">
        <option value="libcurl">libcurl</option>
        <option value="epoxy">epoxy</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button class="modal-btn" id="close-settings">Cancel</button>
      <button class="modal-btn" id="save-settings">Save</button>
    </div>
  </div>
</div>

<div id="toast-msg" class="toast"></div>

<script src="/ximplesc/ximple.mjs" type="module" id="ximple-module"></script>
<script src="app.js" type="module"></script>
</body>
</html>
