<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sunlit</title>
  <link rel="icon" href="data:,">
  
  <meta http-equiv="Content-Security-Policy" content="frame-src * https: http:; default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: https:; style-src * 'unsafe-inline'; font-src * data: blob:;">

  <link rel="stylesheet" href="style.css">
  <script src="/ximplesc/ximple.mjs" type="module" id="ximple-module"></script>
  <base target="_blank">
</head>
<body>

  <div id="exit-fullscreen-overlay">
    <button id="exit-fullscreen-btn" title="Exit Fullscreen">✕</button>
  </div>

  <div id="tab-container">
    <button id="new-tab-btn">+</button>
  </div>

  <div id="toolbar">
    <button class="nav-icon" id="back-btn" title="Back">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-icon" id="forward-btn" title="Forward">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="nav-icon" id="reload-btn" title="Reload">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
    </button>
    <div id="url-wrapper">
      <input id="url-input" type="text" placeholder="Search or enter URL..." autocomplete="off" spellcheck="false">
      <svg class="loading-icon hidden" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 11-6.219-8.56"/>
      </svg>
    </div>
    <button id="fullscreen-btn" title="Fullscreen">⛶</button>
    <button id="menu-dots">&#8942;</button>
  </div>

  <div id="web-container"></div>

  <div id="dropdown-menu">
    <button class="dd-item" id="dd-duck">DuckDuckGo <span class="dd-sub" id="duck-check">&#10003;</span></button>
    <button class="dd-item" id="dd-brave">Brave Search <span class="dd-sub" id="brave-check"></span></button>
    <div class="dd-sep"></div>
    <button class="dd-item" id="dd-settings">Settings</button>
  </div>

  <div id="settings-modal" class="modal-bg">
    <div class="modal-card">
      <h3>Settings</h3>
      <div class="settings-row">
        <label>Wisp Server</label>
        <input id="wisp-url" type="text" placeholder="wss://wisp.waved.site/">
      </div>
      <div class="settings-row">
        <label>Transport</label>
        <select id="transport-select">
          <option value="libcurl">libcurl</option>
          <option value="epoxy">epoxy</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn" id="close-settings">Cancel</button>
        <button class="modal-btn" id="save-settings">Save</button>
      </div>
    </div>
  </div>

  <div id="toast-message" class="toast-msg"></div>

  <script src="app.js"></script>
</body>
</html>
