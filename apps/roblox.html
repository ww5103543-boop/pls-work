<html>
<head>
  <meta charset="UTF-8">
  <title>Roblox</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    *{margin:0;padding:0}
    body,html{width:100%;height:100vh;overflow:hidden}
    iframe{position:fixed;inset:0;width:100%;height:100%;border:none}
  </style>
</head>
<body>
  <iframe id="f" allow="fullscreen; microphone; camera; autoplay"></iframe>
  <script type="module">
    import { setTransport, setWisp, getProxied } from "/ximplesc/ximple.mjs";
    
    setWisp(localStorage.getItem('wispServer') || "wss://wisp.waved.site/");
    setTransport(localStorage.getItem('transport') || "libcurl");
    
    while (!window.scramjet) await new Promise(r => setTimeout(r, 40));
    
    try {
      let res = await fetch('https://api.ipify.org?format=json');
      let data = await res.json();
      let ip = data.ip.split('.')[0];
      let url = `https://${ip}.ip.nowgg.fun/apps/a/19900/b.html`;
      let proxyurl = await getProxied(url);
      document.getElementById('f').src = proxyurl;
    } catch {
      let proxyurl = await getProxied("https://nowgg.fun/apps/a/19900/b.html");
      document.getElementById('f').src = proxyurl;
    }
  </script>
</body>
</htmlr
