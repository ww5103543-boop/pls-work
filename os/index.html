<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimistic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600&family=Noto+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --mint-green: #87b87f;
    --mint-dark: #5a8a52;
    --panel-bg: rgba(30,34,38,0.96);
    --panel-border: rgba(255,255,255,0.08);
    --win-bg: #2d3035;
    --win-titlebar: #3c4048;
    --win-border: #1a1d21;
    --text: #e8eaed;
    --text-muted: #9aa0a8;
    --accent: #87b87f;
    --hover: rgba(255,255,255,0.07);
    --active: rgba(135,184,127,0.18);
    --shadow: 0 8px 40px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    --desktop-font: 'Noto Sans', sans-serif;
    --mono-font: 'Noto Mono', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--desktop-font);
    font-size: 13px;
    color: var(--text);
    user-select: none;
  }

  #desktop {
    position: fixed; inset: 0;
    background: url('https://www.linuxmint.com/pictures/wallpapers/1920x1200/darktrails.jpg') center/cover no-repeat;
    background-color: #1b2c1a;
    overflow: hidden;
  }
  #desktop-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.05) 100%);
  }

  .desktop-icons {
    position: absolute;
    top: 12px; left: 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .desktop-icon {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 6px 8px; border-radius: 6px;
    cursor: pointer; width: 72px;
    transition: background 0.15s;
  }
  .desktop-icon:hover { background: rgba(255,255,255,0.12); }
  .desktop-icon.selected { background: rgba(135,184,127,0.25); }
  .desktop-icon svg, .desktop-icon .icon-img { width: 40px; height: 40px; }
  .desktop-icon span {
    font-size: 11px; color: #fff;
    text-align: center; line-height: 1.3;
    text-shadow: 0 1px 4px rgba(0,0,0,0.9), 0 0 8px rgba(0,0,0,0.6);
    word-break: break-word;
  }

  #taskbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    height: 40px;
    background: var(--panel-bg);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--panel-border);
    display: flex; align-items: center;
    z-index: 9000;
    padding: 0 4px;
  }

  
  #menu-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 4px 10px; height: 32px;
    border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
  }
  #menu-btn:hover { background: var(--hover); }
  #menu-btn svg { width: 20px; height: 20px; fill: var(--mint-green); }
  #menu-btn span { font-size: 13px; font-weight: 500; }

  
  .tb-sep {
    width: 1px; height: 22px;
    background: var(--panel-border); margin: 0 4px;
  }

  
  #pinned-apps {
    display: flex; align-items: center; gap: 2px;
  }
  .pinned-app {
    width: 34px; height: 34px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; position: relative;
  }
  .pinned-app:hover { background: var(--hover); }
  .pinned-app.running::after {
    content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--mint-green);
  }
  .pinned-app svg { width: 20px; height: 20px; }

  
  #open-windows {
    display: flex; align-items: center; gap: 2px;
    flex: 1; overflow: hidden;
  }
  .window-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 0 8px; height: 32px; border-radius: 4px;
    cursor: pointer; transition: background 0.15s;
    max-width: 180px; min-width: 100px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.06);
  }
  .window-btn:hover { background: var(--hover); }
  .window-btn.active { background: var(--active); border-color: rgba(135,184,127,0.3); }
  .window-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .window-btn span { font-size: 11.5px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  
  #systray {
    display: flex; align-items: center; gap: 0;
    margin-left: auto;
  }
  .tray-icon {
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .tray-icon:hover { background: var(--hover); }
  .tray-icon svg { width: 16px; height: 16px; fill: var(--text-muted); }
  .tray-icon:hover svg { fill: var(--text); }

  #clock {
    padding: 0 10px; height: 32px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; border-radius: 4px;
    transition: background 0.15s; line-height: 1.2;
  }
  #clock:hover { background: var(--hover); }
  #clock .time { font-size: 13px; font-weight: 500; color: var(--text); }
  #clock .date { font-size: 10px; color: var(--text-muted); }

  
  .window {
    position: fixed;
    background: rgba(45, 48, 53, 0.88);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--win-border);
    border-radius: 8px;
    box-shadow: var(--shadow);
    display: flex; flex-direction: column;
    overflow: hidden;
    min-width: 300px; min-height: 200px;
    z-index: 100;
    transition: box-shadow 0.15s;
  }
  .window.focused {
    box-shadow: var(--shadow), 0 0 0 1px rgba(135,184,127,0.3);
    z-index: 200;
  }
  .window.minimized { display: none; }
  .window.maximized {
    top: 0 !important; left: 0 !important;
    width: 100vw !important; height: calc(100vh - 40px) !important;
    border-radius: 0;
  }
  .window.glass {
    background: rgba(45, 48, 53, 0.32);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.12);
  }
  .window.glass .titlebar {
    background: rgba(60, 64, 72, 0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
  }
  .window.glass .win-content { background: transparent; }

  
  .titlebar {
    height: 32px;
    background: rgba(60, 64, 72, 0.55);
    display: flex; align-items: center;
    padding: 0 8px; gap: 8px;
    cursor: move; flex-shrink: 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .win-controls {
    display: flex; gap: 6px;
  }
  .win-btn {
    width: 13px; height: 13px; border-radius: 50%;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: bold;
    transition: filter 0.1s;
    position: relative;
  }
  .win-btn:hover { filter: brightness(1.2); }
  .win-btn.close { background: #ff5f57; }
  .win-btn.minimize { background: #febc2e; }
  .win-btn.maximize { background: #28c840; }
  .win-btn .win-btn-icon { opacity: 0; font-style: normal; font-size: 9px; color: rgba(0,0,0,0.6); line-height: 1; }
  .win-btn:hover .win-btn-icon { opacity: 1; }

  .win-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .win-title { font-size: 12.5px; font-weight: 500; color: var(--text); flex: 1; text-align: center; margin-right: 50px; }

  
  .win-content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

  
  .resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 12px; height: 12px; cursor: se-resize;
  }

  
  .fm-toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .fm-btn {
    padding: 3px 8px; border-radius: 3px; cursor: pointer;
    background: transparent; border: none; color: var(--text-muted);
    font-family: var(--desktop-font); font-size: 12px;
    transition: background 0.15s, color 0.15s;
  }
  .fm-btn:hover { background: var(--hover); color: var(--text); }
  .fm-addressbar {
    flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px; padding: 3px 8px; color: var(--text);
    font-family: var(--mono-font); font-size: 12px; outline: none;
  }
  .fm-body { display: flex; flex: 1; overflow: hidden; }
  .fm-sidebar {
    width: 150px; flex-shrink: 0;
    background: rgba(0,0,0,0.15);
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; padding: 8px 0;
  }
  .fm-sidebar-section { padding: 4px 8px 2px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .fm-sidebar-item {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 12px; cursor: pointer;
    transition: background 0.15s; font-size: 12px; color: var(--text);
    border-radius: 3px; margin: 1px 4px;
  }
  .fm-sidebar-item:hover { background: var(--hover); }
  .fm-sidebar-item.active { background: var(--active); color: var(--mint-green); }
  .fm-sidebar-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .fm-files {
    flex: 1; overflow-y: auto; padding: 8px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(72px, 1fr)); gap: 4px;
    align-content: start;
  }
  .fm-file {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .fm-file:hover { background: var(--hover); }
  .fm-file.selected { background: var(--active); }
  .fm-file svg { width: 36px; height: 36px; }
  .fm-file span { font-size: 10.5px; text-align: center; color: var(--text); line-height: 1.3; word-break: break-all; }
  .fm-statusbar {
    padding: 3px 10px; font-size: 11px; color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15); flex-shrink: 0;
  }

  
  .terminal-body {
    flex: 1; background: #1a1a1a;
    font-family: var(--mono-font); font-size: 13px;
    color: #e0e0e0; overflow-y: auto;
    padding: 8px;
  }
  .terminal-line { display: flex; align-items: baseline; gap: 0; }
  .terminal-prompt { color: #87b87f; white-space: nowrap; flex-shrink: 0; }
  .terminal-path { color: #6ab0f5; white-space: nowrap; flex-shrink: 0; }
  .terminal-dollar { color: #fff; margin: 0 4px; flex-shrink: 0; }
  .terminal-output { color: #ccc; padding: 1px 0 1px 0; }
  .terminal-input-line {
    display: flex; align-items: center; margin-top: 2px;
  }
  #terminal-input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: var(--mono-font); font-size: 13px; color: #e0e0e0;
    caret-color: #87b87f;
  }

  
  .editor-menubar {
    display: flex; gap: 0;
    background: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .editor-menu-item {
    padding: 4px 10px; cursor: pointer; font-size: 12px; color: var(--text-muted);
    transition: background 0.15s, color 0.15s;
  }
  .editor-menu-item:hover { background: var(--hover); color: var(--text); }
  .editor-toolbar {
    display: flex; align-items: center; gap: 2px;
    padding: 3px 6px; background: rgba(0,0,0,0.15);
    border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  .editor-tool-btn {
    width: 26px; height: 24px; border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; font-size: 12px; color: var(--text-muted);
  }
  .editor-tool-btn:hover { background: var(--hover); color: var(--text); }
  .editor-tool-sep { width: 1px; height: 18px; background: var(--panel-border); margin: 0 2px; }
  .editor-area {
    flex: 1; background: #1e2227; outline: none; border: none; resize: none;
    font-family: var(--mono-font); font-size: 13px; color: #abb2bf;
    padding: 12px; line-height: 1.6;
  }
  .editor-statusbar {
    padding: 2px 10px; font-size: 11px; color: var(--text-muted);
    border-top: 1px solid rgba(255,255,255,0.06);
    background: rgba(0,0,0,0.15); flex-shrink: 0;
    display: flex; gap: 16px;
  }

  
  #start-menu {
    position: fixed; bottom: 44px; left: 4px;
    width: 560px; height: 480px;
    background: rgba(32,36,42,0.97);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    box-shadow: 0 -4px 40px rgba(0,0,0,0.7);
    z-index: 9500;
    display: none;
    overflow: hidden;
  }
  #start-menu.open { display: flex; }
  .menu-left {
    width: 220px; flex-shrink: 0;
    border-right: 1px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column;
  }
  .menu-search-bar {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .menu-search-input {
    width: 100%; background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 4px;
    padding: 6px 10px; color: var(--text);
    font-family: var(--desktop-font); font-size: 12.5px; outline: none;
  }
  .menu-search-input::placeholder { color: var(--text-muted); }
  .menu-search-input:focus { border-color: var(--mint-green); }
  .menu-apps-list { flex: 1; overflow-y: auto; padding: 6px 0; }
  .menu-app-item {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 14px; cursor: pointer;
    transition: background 0.12s;
  }
  .menu-app-item:hover { background: var(--hover); }
  .menu-app-item svg { width: 18px; height: 18px; flex-shrink: 0; }
  .menu-app-item span { font-size: 13px; color: var(--text); }
  .menu-bottom {
    display: flex; gap: 0;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding: 6px;
  }
  .menu-bottom-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s; font-size: 12px; color: var(--text-muted);
  }
  .menu-bottom-btn:hover { background: var(--hover); color: var(--text); }
  .menu-bottom-btn svg { width: 14px; height: 14px; }
  .menu-right {
    flex: 1; display: flex; flex-direction: column; padding: 12px;
    gap: 8px;
  }
  .menu-right-section { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .menu-place {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border-radius: 4px; cursor: pointer;
    transition: background 0.15s;
  }
  .menu-place:hover { background: var(--hover); }
  .menu-place svg { width: 16px; height: 16px; }
  .menu-place span { font-size: 12.5px; color: var(--text); }
  .menu-user {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0 8px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 8px;
  }
  .menu-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, #87b87f, #5a8a52);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: bold; color: #fff;
    flex-shrink: 0;
  }
  .menu-user-info .name { font-size: 14px; font-weight: 500; }
  .menu-user-info .type { font-size: 11px; color: var(--text-muted); }

  
  #context-menu {
    position: fixed;
    background: rgba(40,44,50,0.97);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    z-index: 10000;
    padding: 4px 0;
    min-width: 180px;
    display: none;
  }
  #context-menu.open { display: block; }
  .ctx-item {
    padding: 6px 16px; cursor: pointer; font-size: 12.5px; color: var(--text);
    transition: background 0.12s; display: flex; align-items: center; gap: 8px;
  }
  .ctx-item:hover { background: var(--hover); }
  .ctx-item svg { width: 14px; height: 14px; color: var(--text-muted); }
  .ctx-sep { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }

  
  #notifications {
    position: fixed; top: 12px; right: 12px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9800; pointer-events: none;
  }
  .notif {
    background: rgba(40,44,50,0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 12px 14px;
    width: 300px; pointer-events: all;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: notifIn 0.25s ease;
  }
  @keyframes notifIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
  .notif-title { font-size: 12.5px; font-weight: 600; margin-bottom: 3px; }
  .notif-body { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

  
  .settings-body { display: flex; flex: 1; overflow: hidden; }
  .settings-sidebar {
    width: 160px; flex-shrink: 0;
    background: rgba(0,0,0,0.15);
    border-right: 1px solid rgba(255,255,255,0.06);
    overflow-y: auto; padding: 8px 0;
  }
  .settings-section { padding: 4px 8px 2px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .settings-item {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 12px; cursor: pointer;
    transition: background 0.15s; font-size: 12px;
    border-radius: 3px; margin: 1px 4px;
  }
  .settings-item:hover { background: var(--hover); }
  .settings-item.active { background: var(--active); color: var(--mint-green); }
  .settings-item svg { width: 14px; height: 14px; flex-shrink: 0; }
  .settings-content {
    flex: 1; overflow-y: auto; padding: 20px;
  }
  .settings-group { margin-bottom: 24px; }
  .settings-group h3 { font-size: 14px; font-weight: 500; margin-bottom: 12px; color: var(--mint-green); }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .settings-row label { font-size: 13px; color: var(--text); }
  .settings-row small { font-size: 11px; color: var(--text-muted); display: block; margin-top: 1px; }
  .toggle {
    width: 36px; height: 20px; background: rgba(255,255,255,0.15);
    border-radius: 10px; cursor: pointer; position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: var(--mint-green); }
  .toggle::after {
    content: ''; position: absolute;
    width: 16px; height: 16px; border-radius: 50%;
    background: #fff; top: 2px; left: 2px;
    transition: transform 0.2s; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform: translateX(16px); }
  .settings-select {
    background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px; padding: 4px 8px; color: var(--text);
    font-family: var(--desktop-font); font-size: 12px; outline: none; cursor: pointer;
  }
  .settings-select option { background: #2d3035; }
  .settings-slider {
    -webkit-appearance: none; width: 120px; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .settings-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--mint-green); cursor: pointer;
  }

  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.25); }

  
  #cal-popup {
    position: fixed; bottom: 44px; right: 4px;
    width: 240px; background: rgba(36,40,46,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
    z-index: 9500; display: none;
  }
  #cal-popup.open { display: block; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-title { font-size: 13px; font-weight: 500; }
  .cal-nav { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px; padding: 2px 6px; border-radius: 3px; }
  .cal-nav:hover { background: var(--hover); color: var(--text); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
  .cal-dow { font-size: 10px; color: var(--text-muted); padding: 2px 0; }
  .cal-day { font-size: 11.5px; padding: 4px 2px; border-radius: 3px; cursor: pointer; transition: background 0.1s; color: var(--text); }
  .cal-day:hover { background: var(--hover); }
  .cal-day.today { background: var(--mint-green); color: #fff; font-weight: 600; }
  .cal-day.other-month { color: var(--text-muted); }
  .cal-time { text-align: center; margin-top: 12px; font-size: 22px; font-weight: 300; color: var(--text); }

  
  #vol-popup {
    position: fixed; bottom: 44px; right: 80px;
    width: 220px; background: rgba(36,40,46,0.97);
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 14px;
    box-shadow: 0 -4px 30px rgba(0,0,0,0.5);
    z-index: 9500; display: none;
  }
  #vol-popup.open { display: block; }
  .vol-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  .vol-slider {
    -webkit-appearance: none; width: 100%; height: 4px;
    border-radius: 2px; background: rgba(255,255,255,0.15); outline: none; cursor: pointer;
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    border-radius: 50%; background: var(--mint-green); cursor: pointer;
  }

  
  #boot-screen {
    position: fixed; inset: 0; z-index: 99999;
    background: #1a2619;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 24px; transition: opacity 0.6s;
  }
  #boot-screen.fadeout { opacity: 0; pointer-events: none; }
  .boot-logo { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .boot-logo svg { width: 80px; height: 80px; }
  .boot-logo h1 { font-size: 28px; font-weight: 300; color: #fff; letter-spacing: 2px; }
  .boot-logo p { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 1px; }
  .boot-progress {
    width: 200px; height: 3px; background: rgba(255,255,255,0.1);
    border-radius: 2px; overflow: hidden;
  }
  .boot-bar { height: 100%; background: var(--mint-green); border-radius: 2px; width: 0; transition: width 0.3s; }
</style>
</head>
<body>

<!-- Boot screen -->
<div id="boot-screen">
  <div class="boot-logo">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#87b87f" stroke-width="3"/>
      <circle cx="50" cy="50" r="30" fill="#87b87f" opacity="0.2"/>
      <text x="50" y="57" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#87b87f" font-weight="bold">M</text>
    </svg>
    <h1>Linux Mint</h1>
    <p>CINNAMON EDITION</p>
  </div>
  <div class="boot-progress"><div class="boot-bar" id="boot-bar"></div></div>
</div>

<!-- Desktop -->
<div id="desktop">
  <div id="desktop-overlay"></div>

  <!-- Windows container -->
  <div id="windows"></div>

  <!-- Context Menu -->
  <div id="context-menu">
    <div class="ctx-item" onclick="openApp('files');closeCtx()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>Open Files</div>
    <div class="ctx-item" onclick="openApp('terminal');closeCtx()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-2 14H6v-2h12v2zm0-4H6v-2h12v2zm0-4H6V7h12v2z"/></svg>Open Terminal Here</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item" onclick="closeCtx()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm-1 14H9V7h2v10zm4 0h-2V7h2v10z"/></svg>Change Background</div>
    <div class="ctx-item" onclick="openApp('settings');closeCtx()"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>Display Settings</div>
  </div>

  <!-- Calendar -->
  <div id="cal-popup">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">‹</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav" onclick="calNav(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="cal-time" id="cal-clock"></div>
  </div>

  <!-- Volume popup -->
  <div id="vol-popup">
    <div class="vol-label"><span>Output Volume</span><span id="vol-pct">75%</span></div>
    <input type="range" class="vol-slider" id="vol-slider" min="0" max="100" value="75" oninput="updateVol(this.value)">
    <div class="vol-label" style="margin-top:10px"><span>Microphone</span><span>100%</span></div>
    <input type="range" class="vol-slider" min="0" max="100" value="100" style="margin-top:4px">
  </div>

  <!-- Notifications -->
  <div id="notifications"></div>

  <!-- Start Menu -->
  <div id="start-menu">
    <div class="menu-left">
      <div class="menu-search-bar">
        <input type="text" class="menu-search-input" placeholder="Type to search…" oninput="filterMenu(this.value)" id="menu-search">
      </div>
      <div class="menu-apps-list" id="menu-apps-list"></div>
      <div class="menu-bottom">
        <div class="menu-bottom-btn" onclick="showNotif('Lock Screen','Screen locked')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
          Lock
        </div>
        <div class="menu-bottom-btn" onclick="showNotif('Logging out…','Goodbye!')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
          Log Out
        </div>
        <div class="menu-bottom-btn" onclick="showNotif('Shutting down…','Goodbye!')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13 3h-2v10h2V3zm4.83 2.17l-1.42 1.42C17.99 7.86 19 9.81 19 12c0 3.87-3.13 7-7 7s-7-3.13-7-7c0-2.19 1.01-4.14 2.58-5.42L6.17 5.17C4.23 6.82 3 9.26 3 12c0 4.97 4.03 9 9 9s9-4.03 9-9c0-2.74-1.23-5.18-3.17-6.83z"/></svg>
          Power
        </div>
      </div>
    </div>
    <div class="menu-right">
      <div class="menu-user">
        <div class="menu-avatar">U</div>
        <div class="menu-user-info">
          <div class="name">user</div>
          <div class="type">Standard Account</div>
        </div>
      </div>
      <div class="menu-right-section">Places</div>
      <div class="menu-place" onclick="openApp('files');toggleMenu()"><svg viewBox="0 0 24 24" fill="#87b87f"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home Folder</span></div>
      <div class="menu-place" onclick="openApp('files');toggleMenu()"><svg viewBox="0 0 24 24" fill="#6ab0f5"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg><span>Documents</span></div>
      <div class="menu-place" onclick="openApp('files');toggleMenu()"><svg viewBox="0 0 24 24" fill="#e8a838"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2z"/></svg><span>Downloads</span></div>
      <div class="menu-place" onclick="showNotif('Computer','Opening system view…');toggleMenu()"><svg viewBox="0 0 24 24" fill="#aaa"><path d="M20 18c1.1 0 1.99-.9 1.99-2L22 6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg><span>Computer</span></div>
    </div>
  </div>

  <!-- Taskbar -->
  <div id="taskbar">
    <div id="menu-btn" onclick="toggleMenu()">
      <svg viewBox="0 0 24 24" fill="#87b87f"><path d="M17 8C8 10 5.9 16.17 3.82 21.34L5.71 22L6.66 19.7C7.14 19.87 7.64 20 8.17 20C10.23 20 12 18.23 12 16C12 14.77 11.35 13.7 10.42 13.06L12.5 10.5L15.5 13.5C15.5 13.5 17 11.5 17 8Z"/></svg>
      <span>Start</span>
    </div>
    <div class="tb-sep"></div>
    <div id="pinned-apps">
      <div class="pinned-app" title="Files" data-app="files" onclick="openApp('files')">
        <svg viewBox="0 0 24 24" fill="#87b87f" width="20" height="20"><path d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>
      </div>
      <div class="pinned-app" title="Terminal" data-app="terminal" onclick="openApp('terminal')">
        <img src="https://icons.iconarchive.com/icons/alecive/flatwoken/256/Apps-Terminal-Pc-104-icon.png" width="20" height="20" style="object-fit:contain">
      </div>
      <div class="pinned-app" title="Text Editor" data-app="editor" onclick="openApp('editor')">
        <img src="https://img.icons8.com/ios_filled/512/40C057/document.png" width="20" height="20" style="object-fit:contain">
      </div>
      <div class="pinned-app" title="Settings" data-app="settings" onclick="openApp('settings')">
        <img src="https://img.icons8.com/ios_filled/512/40C057/apple-settings.png" width="20" height="20" style="object-fit:contain">
      </div>
      <div class="pinned-app" title="Browser" data-app="browser" onclick="openApp('browser')">
        <img src="https://archive.org/download/lalicat-browser-logo/logo1000.png" width="20" height="20" style="object-fit:contain">
      </div>
    </div>
    <div class="tb-sep"></div>
    <div id="open-windows"></div>

    <!-- Systray -->
    <div id="systray">
      <div class="tray-icon" title="Network" onclick="showNotif('Network','Connected to Wired Network — 1 Gbps')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      </div>
      <div class="tray-icon" title="Volume" onclick="togglePopup('vol-popup')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      </div>
      <div class="tray-icon" title="Battery" onclick="showNotif('Battery','97% — Plugged in, charging')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4zM11 18v-3H9l4-7v4h2l-4 6z"/></svg>
      </div>
      <div class="tray-icon" title="Updates" onclick="showNotif('Update Manager','Your system is up to date.')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
      </div>
      <div id="clock" onclick="togglePopup('cal-popup')">
        <span class="time" id="clock-time">00:00</span>
        <span class="date" id="clock-date">Mon 01 Jan</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── STATE ──
let zTop = 200;
let windows = {};
let focused = null;
let calDate = new Date();

// ── BOOT ──
const bar = document.getElementById('boot-bar');
let prog = 0;
const bootInt = setInterval(() => {
  prog += Math.random() * 18 + 5;
  if (prog >= 100) {
    prog = 100; clearInterval(bootInt);
    setTimeout(() => {
      document.getElementById('boot-screen').classList.add('fadeout');
      setTimeout(() => { document.getElementById('boot-screen').remove(); showNotif('Welcome to Linux Mint', 'Cinnamon 6.0 — Ready'); }, 650);
    }, 300);
  }
  bar.style.width = prog + '%';
}, 160);

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}`;
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent = `${days[now.getDay()]} ${pad(now.getDate())} ${months[now.getMonth()]}`;
  document.getElementById('cal-clock').textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
updateClock(); setInterval(updateClock, 1000);

// ── CALENDAR ──
function renderCal() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('cal-title').textContent = `${months[m]} ${y}`;
  const first = new Date(y,m,1).getDay();
  const days = new Date(y,m+1,0).getDate();
  const today = new Date();
  let html = ['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<first;i++) {
    const d = new Date(y,m,-(first-i-1));
    html += `<div class="cal-day other-month">${d.getDate()}</div>`;
  }
  for(let d=1;d<=days;d++) {
    const isToday = d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
    html += `<div class="cal-day${isToday?' today':''}">${d}</div>`;
  }
  document.getElementById('cal-grid').innerHTML = html;
}
function calNav(dir) { calDate.setMonth(calDate.getMonth()+dir); renderCal(); }
renderCal();

// ── VOLUME ──
function updateVol(v) {
  document.getElementById('vol-pct').textContent = v + '%';
}

// ── POPUPS ──
function togglePopup(id) {
  const el = document.getElementById(id);
  const open = el.classList.contains('open');
  document.querySelectorAll('#cal-popup,#vol-popup,#start-menu').forEach(e=>e.classList.remove('open'));
  if(!open) el.classList.add('open');
}
document.addEventListener('click', e => {
  if(!e.target.closest('#cal-popup,#clock,#vol-popup,.tray-icon[title="Volume"],#start-menu,#menu-btn'))
    document.querySelectorAll('#cal-popup,#vol-popup,#start-menu').forEach(e=>e.classList.remove('open'));
  if(!e.target.closest('#context-menu')) closeCtx();
});

// ── START MENU ──
// Icons are kept identical to the pinned-app row in the taskbar.
const allApps = [
  { id:'files', label:'Files', svg:{ color:'#87b87f', path:'M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z' } },
  { id:'terminal', label:'Terminal', img:'https://icons.iconarchive.com/icons/alecive/flatwoken/256/Apps-Terminal-Pc-104-icon.png' },
  { id:'editor', label:'Text Editor', img:'https://img.icons8.com/ios_filled/512/40C057/document.png' },
  { id:'settings', label:'System Settings', img:'https://img.icons8.com/ios_filled/512/40C057/apple-settings.png' },
  { id:'browser', label:'Browser', img:'https://archive.org/download/lalicat-browser-logo/logo1000.png' },
];
function buildMenuList(filter='') {
  const list = document.getElementById('menu-apps-list');
  const filtered = filter ? allApps.filter(a=>a.label.toLowerCase().includes(filter.toLowerCase())) : allApps;
  list.innerHTML = filtered.map(a=>{
    const icon = a.img
      ? `<img src="${a.img}" width="18" height="18" style="object-fit:contain;flex-shrink:0">`
      : `<svg viewBox="0 0 24 24" fill="${a.svg.color}" width="18" height="18"><path d="${a.svg.path}"/></svg>`;
    return `
    <div class="menu-app-item" onclick="openApp('${a.id}');toggleMenu()">
      ${icon}
      <span>${a.label}</span>
    </div>`;
  }).join('');
}
function filterMenu(v) { buildMenuList(v); }
function toggleMenu() {
  const m = document.getElementById('start-menu');
  const open = m.classList.contains('open');
  document.querySelectorAll('#cal-popup,#vol-popup').forEach(e=>e.classList.remove('open'));
  m.classList.toggle('open');
  if(!open) { buildMenuList(); document.getElementById('menu-search').value=''; document.getElementById('menu-search').focus(); }
}
buildMenuList();

// ── CONTEXT MENU ──
document.getElementById('desktop').addEventListener('contextmenu', e => {
  if(e.target.closest('.window,.taskbar,#start-menu')) return;
  e.preventDefault();
  const ctx = document.getElementById('context-menu');
  ctx.style.left = Math.min(e.clientX, window.innerWidth-190) + 'px';
  ctx.style.top = Math.min(e.clientY, window.innerHeight-200) + 'px';
  ctx.classList.add('open');
});
function closeCtx() { document.getElementById('context-menu').classList.remove('open'); }

// ── DESKTOP ICON SELECTION ──
function selectIcon(el) {
  document.querySelectorAll('.desktop-icon').forEach(i=>i.classList.remove('selected'));
  el.classList.add('selected');
}
document.getElementById('desktop').addEventListener('click', e => {
  if(!e.target.closest('.desktop-icon')) document.querySelectorAll('.desktop-icon').forEach(i=>i.classList.remove('selected'));
});

// ── NOTIFICATIONS ──
function showNotif(title, body) {
  const container = document.getElementById('notifications');
  const el = document.createElement('div');
  el.className = 'notif';
  el.innerHTML = `<div class="notif-title">${title}</div><div class="notif-body">${body}</div>`;
  container.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='all 0.3s'; setTimeout(()=>el.remove(),300); }, 4000);
}

// ── WINDOW MANAGEMENT ──
function focusWindow(id) {
  if(focused===id) return;
  document.querySelectorAll('.window').forEach(w=>w.classList.remove('focused'));
  const win = document.getElementById('win-'+id);
  if(win) { win.classList.add('focused'); win.style.zIndex = ++zTop; focused = id; }
  document.querySelectorAll('.window-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.getElementById('tb-'+id);
  if(btn) btn.classList.add('active');
}
function minimizeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(!win) return;
  const wasMin = win.classList.contains('minimized');
  win.classList.toggle('minimized');
  if(wasMin) focusWindow(id);
  else { focused = null; document.getElementById('tb-'+id)?.classList.remove('active'); }
}
function maximizeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(!win) return;
  if(win.classList.contains('maximized')) {
    win.classList.remove('maximized');
    const s = windows[id].savedPos;
    if(s) { win.style.left=s.left; win.style.top=s.top; win.style.width=s.width; win.style.height=s.height; }
  } else {
    windows[id].savedPos = { left:win.style.left, top:win.style.top, width:win.style.width, height:win.style.height };
    win.classList.add('maximized');
  }
}
function closeWindow(id) {
  const win = document.getElementById('win-'+id);
  if(win) win.remove();
  document.getElementById('tb-'+id)?.remove();
  delete windows[id];
  focused = null;
  document.querySelectorAll('.pinned-app').forEach(p => {
    if(p.dataset.app === id) p.classList.remove('running');
  });
}

function createWindow(id, title, width, height, x, y, contentFn, iconPath, glass) {
  if(windows[id]) { const e=document.getElementById('win-'+id); e?.classList.remove('minimized'); focusWindow(id); return; }
  windows[id] = { id, title };
  const win = document.createElement('div');
  win.className = 'window focused' + (glass ? ' glass' : '');
  win.id = 'win-'+id;
  win.style.cssText = `left:${x}px;top:${y}px;width:${width}px;height:${height}px;z-index:${++zTop}`;
  
  let iconHTML = '';
  if(iconPath && iconPath.startsWith('http')) {
    iconHTML = `<img class="win-icon" src="${iconPath}" style="width:16px;height:16px;object-fit:contain">`;
  } else {
    iconHTML = `<svg class="win-icon" viewBox="0 0 24 24" fill="#aaa"><path d="${iconPath}"/></svg>`;
  }
  
  win.innerHTML = `
    <div class="titlebar" id="tb-drag-${id}">
      <div class="win-controls">
        <button class="win-btn close" id="close-btn-${id}" type="button"><i class="win-btn-icon">✕</i></button>
        <button class="win-btn minimize" id="min-btn-${id}" type="button"><i class="win-btn-icon">−</i></button>
        <button class="win-btn maximize" id="max-btn-${id}" type="button"><i class="win-btn-icon">+</i></button>
      </div>
      ${iconHTML}
      <div class="win-title">${title}</div>
    </div>
    <div class="win-content" id="wc-${id}">${contentFn()}</div>
    <div class="resize-handle" id="rh-${id}"></div>
  `;
  document.getElementById('windows').appendChild(win);
  
  // Attach event listeners to buttons
  setTimeout(() => {
    const closeBtn = document.getElementById('close-btn-'+id);
    const minBtn = document.getElementById('min-btn-'+id);
    const maxBtn = document.getElementById('max-btn-'+id);
    if(closeBtn) closeBtn.addEventListener('click', (e) => { e.stopPropagation(); closeWindow(id); });
    if(minBtn) minBtn.addEventListener('click', (e) => { e.stopPropagation(); minimizeWindow(id); });
    if(maxBtn) maxBtn.addEventListener('click', (e) => { e.stopPropagation(); maximizeWindow(id); });
  }, 0);
  
  win.addEventListener('mousedown', () => focusWindow(id));
  makeDraggable(win, document.getElementById('tb-drag-'+id));
  makeResizable(win, document.getElementById('rh-'+id));
  addWindowBtn(id, title, iconPath);
  focusWindow(id);
  if(id==='terminal') initTerminal();
}

function addWindowBtn(id, title, iconPath) {
  const bar = document.getElementById('open-windows');
  const btn = document.createElement('div');
  btn.className = 'window-btn active'; btn.id = 'tb-'+id;
  const iconHtml = (iconPath && iconPath.startsWith('http'))
    ? `<img src="${iconPath}" width="16" height="16" style="object-fit:contain;flex-shrink:0">`
    : `<svg viewBox="0 0 24 24" fill="#87b87f" width="16" height="16"><path d="${iconPath}"/></svg>`;
  btn.innerHTML = `${iconHtml}<span>${title}</span>`;
  btn.addEventListener('click', () => {
    const win = document.getElementById('win-'+id);
    if(!win) return;
    if(focused===id && !win.classList.contains('minimized')) minimizeWindow(id);
    else { win.classList.remove('minimized'); focusWindow(id); }
  });
  bar.appendChild(btn);
}

// ── DRAG & RESIZE ──
function makeDraggable(win, handle) {
  let dx,dy,dragging=false;
  handle.addEventListener('mousedown', e => {
    if(e.target.closest('.win-controls')) return;
    if(win.classList.contains('maximized')) return;
    dragging=true; dx=e.clientX-win.offsetLeft; dy=e.clientY-win.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if(!dragging) return;
    win.style.left = Math.max(0,Math.min(window.innerWidth-win.offsetWidth,e.clientX-dx))+'px';
    win.style.top = Math.max(0,Math.min(window.innerHeight-win.offsetHeight-40,e.clientY-dy))+'px';
  });
  document.addEventListener('mouseup', () => dragging=false);
  handle.addEventListener('dblclick', () => maximizeWindow(win.id.replace('win-','')));
}
function makeResizable(win, handle) {
  let sx,sy,sw,sh,resizing=false;
  handle.addEventListener('mousedown', e => {
    resizing=true; sx=e.clientX; sy=e.clientY; sw=win.offsetWidth; sh=win.offsetHeight;
    e.preventDefault(); e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if(!resizing) return;
    win.style.width = Math.max(300,sw+e.clientX-sx)+'px';
    win.style.height = Math.max(200,sh+e.clientY-sy)+'px';
  });
  document.addEventListener('mouseup', () => resizing=false);
}

function initTerminal() {
  const input = document.getElementById('terminal-input');
  if(!input) return;
  input.focus();
  input.addEventListener('keydown', e => {
    if(e.key==='Enter') {
      const cmd = input.value.trim();
      input.value = '';
      if(!cmd) { appendTermLine(''); return; }
      terminalHistory.unshift(cmd); termHistIdx=-1;
      appendTermPromptLine(cmd);
      const parts = cmd.split(' ');
      const fn = termCmds[parts[0]];
      if(fn) {
        const out = fn(parts.slice(1));
        if(out===null) return;
        if(out) out.split('\n').forEach(l=>appendTermOutput(l));
      } else {
        appendTermOutput(`${parts[0]}: command not found`);
      }
      appendTermLine('');
    } else if(e.key==='ArrowUp') {
      termHistIdx = Math.min(termHistIdx+1, terminalHistory.length-1);
      input.value = terminalHistory[termHistIdx]||'';
      e.preventDefault();
    } else if(e.key==='ArrowDown') {
      termHistIdx = Math.max(termHistIdx-1,-1);
      input.value = termHistIdx>=0 ? terminalHistory[termHistIdx] : '';
      e.preventDefault();
    }
  });
}

function appendTermPromptLine(cmd) {
  const b = document.getElementById('term-body');
  if(!b) return;
  const cwd = termCwd===('~') ? '~' : termCwd.split('/').pop();
  const line = document.createElement('div');

  b.appendChild(line); b.scrollTop=b.scrollHeight;
}
function appendTermOutput(html) {
  const b = document.getElementById('term-body');
  if(!b) return;
  const line = document.createElement('div');
  line.className='terminal-output';
  line.innerHTML = html;
  b.appendChild(line); b.scrollTop=b.scrollHeight;

function appendTermLine(text) {

          <div class="settings-row"><div><label>Animations</label><small>Enable window animations</small></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="settings-row"><div><label>Dark Mode</label><small>Use dark variant of theme</small></div><div class="toggle on" onclick="this.classList.toggle('on')"></div></div>
          <div class="settings-row"><div><label>Transparency</label><small>Panel and menu transparency</small></div><input type="range" class="settings-slider" min="0" max="100" value="80"></div>
        </div>
      </div>
    </div>
  `;
}
function svgIcon(path, size=16) {
  return `<svg viewBox="0 0 24 24" fill="currentColor" width="${size}" height="${size}" style="flex-shrink:0"><path d="${path}"/></svg>`;
}
function settingsSelect(el, name) {
  document.querySelectorAll('.settings-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

// ── OPEN APPS ──
let winOffsetX = 40, winOffsetY = 40;
function openApp(id) {
  const configs = {
    files: { title:'Files', w:720, h:480, icon:'M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z', fn: filesContent },
    terminal: { title:'Terminal', w:650, h:400, icon:'https://icons.iconarchive.com/icons/alecive/flatwoken/256/Apps-Terminal-Pc-104-icon.png', fn: terminalContent },
    editor: { title:'Text Editor', w:680, h:500, icon:'https://img.icons8.com/ios_filled/512/40C057/document.png', fn: editorContent },
    settings: { title:'System Settings', w:700, h:460, icon:'https://img.icons8.com/ios_filled/512/40C057/apple-settings.png', fn: settingsContent },
    browser: { title:'Browser', w:880, h:620, icon:'https://archive.org/download/lalicat-browser-logo/logo1000.png', glass:true, fn: () => '<iframe src="/index.html" allowtransparency="true" style="width:100%;height:100%;border:none;background:transparent" allow="fullscreen; clipboard-read; clipboard-write"></iframe>' },
  };
  const cfg = configs[id];
  if(!cfg) return;
  const x = Math.min(60 + (winOffsetX % 200), window.innerWidth - cfg.w - 20);
  const y = Math.min(40 + (winOffsetY % 160), window.innerHeight - cfg.h - 60);
  winOffsetX += 24; winOffsetY += 24;
  createWindow(id, cfg.title, cfg.w, cfg.h, x, y, cfg.fn, cfg.icon, cfg.glass);
  if(id==='files') setTimeout(fmRender, 50);
  if(id==='editor') setTimeout(setupEditor, 50);
  // mark pinned
  document.querySelectorAll('.pinned-app').forEach(p=>{ if(p.title===cfg.title) p.classList.add('running'); });
  document.getElementById('start-menu').classList.remove('open');
}

function setupEditor() {
  const ea = document.getElementById('editor-area');
  const pos = document.getElementById('editor-pos');
  const wc = document.getElementById('editor-wc');
  if(!ea) return;
  ea.addEventListener('keyup', () => {
    if(pos) {
      const text = ea.value.substring(0, ea.selectionStart);
      const lines = text.split('\n');
      pos.textContent = `Ln ${lines.length}, Col ${lines[lines.length-1].length+1}`;
    }
    if(wc) wc.textContent = `Words: ${ea.value.trim().split(/\s+/).filter(Boolean).length}`;
  });
}

// ── KEYBOARD SHORTCUTS ──
document.addEventListener('keydown', e => {
  if(e.ctrlKey && e.key==='F1') { e.preventDefault(); openApp('files'); }
  if(e.ctrlKey && e.key==='F2') { e.preventDefault(); openApp('terminal'); }
  if(e.ctrlKey && e.key==='F3') { e.preventDefault(); openApp('editor'); }
  if(e.key==='Super'||e.key==='Meta') { e.preventDefault(); toggleMenu(); }
  if(e.altKey && e.key==='F4' && focused) { e.preventDefault(); closeWindow(focused); }
});

// ── PERSISTENCE ──
const OPT_STATE_KEY = 'optimistic.os.windows';
const OPT_EDITOR_KEY = 'optimistic.os.editor.text';
const OPT_SETTINGS_KEY = 'optimistic.os.settings';
let osStateLoaded = false;

function saveOSState() {
  if (!osStateLoaded) return;
  const open = [];
  Object.keys(windows).forEach(id => {
    const win = document.getElementById('win-'+id);
    if (!win) return;
    const isMax = win.classList.contains('maximized');
    const isMin = win.classList.contains('minimized');
    const geom = isMax
      ? (windows[id].savedPos || null)
      : { left: win.style.left, top: win.style.top, width: win.style.width, height: win.style.height };
    open.push({ id, maximized: isMax, minimized: isMin, geom });
  });
  try { localStorage.setItem(OPT_STATE_KEY, JSON.stringify(open)); } catch(_){}
}

// Wrap lifecycle functions so any change persists
(function patchWindowFns(){
  const _c = createWindow, _x = closeWindow, _mn = minimizeWindow, _mx = maximizeWindow;
  createWindow = function(){ const r = _c.apply(this, arguments); saveOSState(); return r; };
  closeWindow = function(){ const r = _x.apply(this, arguments); saveOSState(); return r; };
  minimizeWindow = function(){ const r = _mn.apply(this, arguments); saveOSState(); return r; };
  maximizeWindow = function(){ const r = _mx.apply(this, arguments); saveOSState(); return r; };
})();

// Persist after drag/resize
document.addEventListener('mouseup', () => setTimeout(saveOSState, 60));
window.addEventListener('beforeunload', saveOSState);

// Editor: persist text on every input + restore when opened
document.addEventListener('input', e => {
  if (e.target && e.target.id === 'editor-area') {
    try { localStorage.setItem(OPT_EDITOR_KEY, e.target.value); } catch(_){}
  }
});

// Settings: persist toggles/selects/sliders
function saveSettings() {
  const data = {};
  document.querySelectorAll('.settings-row').forEach((row, i) => {
    const label = row.querySelector('label')?.textContent || ('row'+i);
    const toggle = row.querySelector('.toggle');
    const select = row.querySelector('select');
    const slider = row.querySelector('input[type=range]');
    if (toggle) data[label] = { type:'toggle', value: toggle.classList.contains('on') };
    else if (select) data[label] = { type:'select', value: select.value };
    else if (slider) data[label] = { type:'slider', value: slider.value };
  });
  try { localStorage.setItem(OPT_SETTINGS_KEY, JSON.stringify(data)); } catch(_){}
}
document.addEventListener('click', e => {
  if (e.target?.classList?.contains('toggle')) setTimeout(saveSettings, 0);
});
document.addEventListener('change', e => {
  if (e.target?.matches?.('.settings-select, .settings-slider, input[type=range]')) saveSettings();
});

// Watch the DOM and hydrate editor textarea / settings rows when they appear
new MutationObserver(() => {
  const ea = document.getElementById('editor-area');
  if (ea && !ea.dataset.optHydrated) {
    ea.dataset.optHydrated = '1';
    const saved = localStorage.getItem(OPT_EDITOR_KEY);
    if (saved !== null) ea.value = saved;
  }
  const sb = document.querySelector('.settings-body');
  if (sb && !sb.dataset.optHydrated) {
    sb.dataset.optHydrated = '1';
    let saved = null;
    try { saved = JSON.parse(localStorage.getItem(OPT_SETTINGS_KEY) || 'null'); } catch(_){}
    if (saved) {
      sb.querySelectorAll('.settings-row').forEach((row, i) => {
        const label = row.querySelector('label')?.textContent || ('row'+i);
        const v = saved[label]; if (!v) return;
        const toggle = row.querySelector('.toggle');
        const select = row.querySelector('select');
        const slider = row.querySelector('input[type=range]');
        if (toggle && v.type==='toggle') toggle.classList.toggle('on', !!v.value);
        else if (select && v.type==='select') select.value = v.value;
        else if (slider && v.type==='slider') slider.value = v.value;
      });
    }
  }
}).observe(document.body, { childList: true, subtree: true });

// Restore previously open windows on boot
(function restoreOSWindows(){
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(OPT_STATE_KEY) || 'null'); } catch(_){}
  if (Array.isArray(saved) && saved.length) {
    saved.forEach(s => {
      try {
        openApp(s.id);
        const win = document.getElementById('win-'+s.id);
        if (!win) return;
        if (s.geom && s.geom.left) {
          win.style.left = s.geom.left; win.style.top = s.geom.top;
          win.style.width = s.geom.width; win.style.height = s.geom.height;
        }
        if (s.maximized) {
          if (windows[s.id]) windows[s.id].savedPos = s.geom;
          win.classList.add('maximized');
        }
        if (s.minimized) win.classList.add('minimized');
      } catch(_){}
    });
  }
  osStateLoaded = true;
})();
</script>
