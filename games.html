<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sunlit</title>
  <link rel="icon" href="data:,">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0a0a0a;
      --chrome-bg: rgba(12, 12, 16, 0.92);
      --chrome-border: rgba(255, 255, 255, 0.07);
      --text: #b0b0b8;
      --text-dim: #6e6e7a;
      --text-bright: #ffffff;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 30px 40px 20px 40px;
      background: var(--chrome-bg);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--chrome-border);
    }

    .header h1 {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: -1px;
      margin-bottom: 8px;
      font-style: italic;
      background: linear-gradient(135deg, #eaeef5, #b0b0c8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .header .subtitle {
      color: var(--text-dim);
      font-size: 1rem;
      font-weight: 400;
    }

    #games {
      flex: 1;
      padding: 20px 40px;
      min-height: 500px;
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 300px;
      color: var(--text-dim);
      font-size: 1.2rem;
    }

    .footer {
      padding: 20px 40px;
      background: var(--chrome-bg);
      backdrop-filter: blur(20px);
      border-top: 1px solid var(--chrome-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .footer-brand {
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .footer-brand span {
      color: var(--text-bright);
      font-weight: 500;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg);
    }

    ::-webkit-scrollbar-thumb {
      background: #2a2a34;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #38383e;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>sunlit</h1>
    <p class="subtitle" id="game-count">Browse and play 1,168 games</p>
  </div>

  <div id="games">
    <div class="loading">Loading games...</div>
  </div>

  <div class="footer">
    <div class="footer-brand"><span>Sunlit</span></div>
    <div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
  <script>
    Lumin.init({
      container: '#games',
      theme: 'dark'
    });

    setTimeout(() => {
      const gamesContainer = document.querySelector('#games');
      const gameCards = gamesContainer.querySelectorAll('[data-game], .game-card, .lumin-game');
      if (gameCards.length > 0) {
        document.getElementById('game-count').textContent = 'Browse and play ' + gameCards.length.toLocaleString() + ' games';
      }
    }, 3000);
  </script>

</body>
</html>
